openapi: 3.1.0

info:
  title: ServiceCycle Public API
  version: 1.0.0
  description: |
    Read-only REST API for ServiceCycle — self-hosted contract renewal management.

    **Base URL**: `https://<your-servicecycle-host>/api/v1`

    All endpoints require an API key issued by a ServiceCycle admin (Settings → API Keys).
    Pass the key in the `Authorization` header as a Bearer token:

    ```
    Authorization: Bearer liq_<your-key>
    ```

    **Rate limit**: 60 requests per minute per API key.
    Responses include standard `RateLimit-*` headers.

    All responses use the envelope `{ "success": true, "data": ... }`.
    List endpoints add a `pagination` object.
    Error responses use `{ "success": false, "error": "..." }`.

contact:
  name: ServiceCycle / ForgeRift LLC
  url: https://servicecycle.app

license:
  name: Proprietary
  url: https://servicecycle.app/legal/terms

servers:
  - url: https://servicecycle.app/api/v1
    description: Public demo instance (read-only seed data)
  - url: https://{host}/api/v1
    description: Your self-hosted instance
    variables:
      host:
        default: localhost:3001
        description: Hostname (and optional port) of your ServiceCycle server

# ─── Security ─────────────────────────────────────────────────────────────────

components:
  securitySchemes:
    ApiKeyBearer:
      type: http
      scheme: bearer
      bearerFormat: ServiceCycle API Key
      description: |
        API key generated in Settings → API Keys.
        Keys start with the prefix `liq_` followed by 64 hex characters.

  # ── Reusable schemas ────────────────────────────────────────────────────────

  schemas:

    Pagination:
      type: object
      required: [page, limit, total, pages]
      properties:
        page:  { type: integer, example: 1 }
        limit: { type: integer, example: 50 }
        total: { type: integer, example: 243 }
        pages: { type: integer, example: 5 }

    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success: { type: boolean, enum: [false] }
        error:   { type: string, example: "Invalid API key" }

    VendorSummary:
      type: object
      properties:
        id:   { type: string, format: uuid }
        name: { type: string, example: "Microsoft" }

    CategorySummary:
      type: object
      properties:
        id:   { type: string, format: uuid }
        name: { type: string, example: "SaaS" }
        slug: { type: string, example: "saas" }

    ContractStatus:
      type: string
      enum: [active, under_review, renewed, cancelled, expired]

    ContractSummary:
      type: object
      properties:
        id:                   { type: string, format: uuid }
        contractNumber:       { type: string, nullable: true }
        product:              { type: string, example: "Microsoft 365 E3" }
        status:               { $ref: '#/components/schemas/ContractStatus' }
        startDate:            { type: string, format: date-time, nullable: true }
        endDate:              { type: string, format: date-time, nullable: true }
        autoRenewal:          { type: boolean }
        autoRenewalNoticeDays: { type: integer, nullable: true }
        cancelByDate:         { type: string, format: date-time, nullable: true }
        quantity:             { type: integer, nullable: true }
        costPerLicense:       { type: string, format: decimal, nullable: true, example: "42.00" }
        totalValue:           { type: string, format: decimal, nullable: true, example: "50400.00" }
        poNumber:             { type: string, nullable: true }
        department:           { type: string, nullable: true }
        team:                 { type: string, nullable: true }
        notes:                { type: string, nullable: true }
        coTermGroup:          { type: string, nullable: true }
        createdAt:            { type: string, format: date-time }
        updatedAt:            { type: string, format: date-time }
        vendor:               { $ref: '#/components/schemas/VendorSummary' }
        category:             { $ref: '#/components/schemas/CategorySummary', nullable: true }

    ContractDetail:
      allOf:
        - $ref: '#/components/schemas/ContractSummary'
        - type: object
          properties:
            customerNumber:       { type: string, nullable: true }
            invoiceNumber:        { type: string, nullable: true }
            requestor:            { type: string, nullable: true }
            deliveryMethod:       { type: string, enum: [user, device, shared_pool], nullable: true }
            resellerName:         { type: string, nullable: true }
            resellerAccountNumber: { type: string, nullable: true }
            resellerContactName:  { type: string, nullable: true }
            resellerContactEmail: { type: string, format: email, nullable: true }
            signatureStatus:      { type: string, enum: [pending, signed, declined], nullable: true }
            signedAt:             { type: string, format: date-time, nullable: true }
            signerName:           { type: string, nullable: true }
            originalAsk:          { type: string, format: decimal, nullable: true }
            finalNegotiatedPrice: { type: string, format: decimal, nullable: true }
            seatsLicensed:        { type: integer, nullable: true }
            seatsActivelyInUse:   { type: integer, nullable: true }
            annualUpliftPercent:  { type: string, format: decimal, nullable: true }
            renewalChecklist:     { type: object, nullable: true }
            tags:
              type: array
              items:
                type: object
                properties:
                  tag: { type: string }
            flags:
              type: array
              items:
                type: object
                properties:
                  flagType:    { type: string }
                  description: { type: string }

    VendorContact:
      type: object
      properties:
        id:    { type: string, format: uuid }
        name:  { type: string }
        email: { type: string, format: email, nullable: true }
        phone: { type: string, nullable: true }
        title: { type: string, nullable: true }

    VendorSummaryFull:
      type: object
      properties:
        id:                   { type: string, format: uuid }
        name:                 { type: string, example: "Microsoft" }
        cotermComplexity:     { type: string, enum: [none, moderate, complex] }
        notes:                { type: string, nullable: true }
        budgetUpliftPercent:  { type: string, format: decimal, example: "10.00" }
        supportEmail:         { type: string, format: email, nullable: true }
        supportPhone:         { type: string, nullable: true }
        supportPortalUrl:     { type: string, format: uri, nullable: true }
        scorePriceFlexibility: { type: integer, minimum: 1, maximum: 5, nullable: true }
        scoreSupport:         { type: integer, minimum: 1, maximum: 5, nullable: true }
        scoreStrategicValue:  { type: integer, minimum: 1, maximum: 5, nullable: true }
        scoreSatisfaction:    { type: integer, minimum: 1, maximum: 5, nullable: true }
        createdAt:            { type: string, format: date-time }
        updatedAt:            { type: string, format: date-time }

    VendorDetail:
      allOf:
        - $ref: '#/components/schemas/VendorSummaryFull'
        - type: object
          properties:
            cotermNotes: { type: string, nullable: true }
            aliases:     { type: array, items: { type: string }, nullable: true }
            contacts:
              type: array
              items: { $ref: '#/components/schemas/VendorContact' }
            _count:
              type: object
              properties:
                contracts: { type: integer }

    UpcomingRenewalItem:
      type: object
      properties:
        id:             { type: string, format: uuid }
        contractNumber: { type: string, nullable: true }
        product:        { type: string }
        status:         { $ref: '#/components/schemas/ContractStatus' }
        endDate:        { type: string, format: date-time, nullable: true }
        cancelByDate:   { type: string, format: date-time, nullable: true }
        autoRenewal:    { type: boolean }
        autoRenewalNoticeDays: { type: integer, nullable: true }
        totalValue:     { type: string, format: decimal, nullable: true }
        vendor:         { $ref: '#/components/schemas/VendorSummary' }
        category:       { $ref: '#/components/schemas/CategorySummary', nullable: true }

  # ── Reusable parameters ─────────────────────────────────────────────────────

  parameters:

    PageParam:
      name: page
      in: query
      description: 1-based page number
      schema: { type: integer, minimum: 1, default: 1 }

    LimitParam:
      name: limit
      in: query
      description: Results per page (max 100)
      schema: { type: integer, minimum: 1, maximum: 100, default: 50 }

  # ── Reusable responses ──────────────────────────────────────────────────────

  responses:

    Unauthorized:
      description: Missing, invalid, expired, or revoked API key
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example: { success: false, error: "Invalid API key" }

    RateLimited:
      description: Too many requests — 60/min per key
      headers:
        RateLimit-Limit:     { schema: { type: integer } }
        RateLimit-Remaining: { schema: { type: integer } }
        Retry-After:         { schema: { type: integer } }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

    NotFound:
      description: Resource not found (or not visible to this API key's account)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

    BadRequest:
      description: Invalid query parameters
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorResponse'
              - type: object
                properties:
                  details: { type: object, description: "Per-field validation errors" }

# ─── Security (global default) ────────────────────────────────────────────────

security:
  - ApiKeyBearer: []

# ─── Paths ────────────────────────────────────────────────────────────────────

paths:

  # ── Contracts ────────────────────────────────────────────────────────────────

  /contracts:
    get:
      operationId: listContracts
      summary: List contracts
      description: |
        Returns a paginated list of non-archived contracts for the account
        associated with the API key. Results are sorted by `endDate` ascending
        (earliest renewals first).
      tags: [Contracts]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          description: Filter by contract status
          schema: { $ref: '#/components/schemas/ContractStatus' }
        - name: vendor
          in: query
          description: Case-insensitive substring match on vendor name
          schema: { type: string, maxLength: 200, example: "Microsoft" }
        - name: renewalBefore
          in: query
          description: |
            Return only contracts whose `endDate` is on or before this date.
            Accepts ISO 8601 (`2026-12-31T00:00:00Z`) or `YYYY-MM-DD`.
          schema: { type: string, example: "2026-12-31" }
      responses:
        '200':
          description: Paginated contract list
          content:
            application/json:
              schema:
                type: object
                required: [success, data, pagination]
                properties:
                  success:    { type: boolean, enum: [true] }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ContractSummary' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /contracts/{id}:
    get:
      operationId: getContract
      summary: Get a contract
      description: Returns full detail for a single contract, including tags and risk flags.
      tags: [Contracts]
      parameters:
        - name: id
          in: path
          required: true
          description: Contract UUID
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Contract detail
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success: { type: boolean, enum: [true] }
                  data:    { $ref: '#/components/schemas/ContractDetail' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }

  # ── Vendors ──────────────────────────────────────────────────────────────────

  /vendors:
    get:
      operationId: listVendors
      summary: List vendors
      description: Returns a paginated list of vendors, sorted alphabetically by name.
      tags: [Vendors]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated vendor list
          content:
            application/json:
              schema:
                type: object
                required: [success, data, pagination]
                properties:
                  success:    { type: boolean, enum: [true] }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/VendorSummaryFull' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /vendors/{id}:
    get:
      operationId: getVendor
      summary: Get a vendor
      description: Returns full detail for a single vendor, including contacts and contract count.
      tags: [Vendors]
      parameters:
        - name: id
          in: path
          required: true
          description: Vendor UUID
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Vendor detail
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success: { type: boolean, enum: [true] }
                  data:    { $ref: '#/components/schemas/VendorDetail' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }

  # ── Reports ──────────────────────────────────────────────────────────────────

  /reports/upcoming-renewals:
    get:
      operationId: upcomingRenewals
      summary: Upcoming renewals report
      description: |
        Returns contracts renewing within the next `days` days (counting from now),
        sorted ascending by `endDate`. Excludes cancelled and expired contracts,
        and any archived contracts.

        Use this endpoint to drive renewal dashboards, Slack digests, or
        calendar/ticketing integrations.
      tags: [Reports]
      parameters:
        - name: days
          in: query
          description: Look-ahead window in days (1–730, default 90)
          schema: { type: integer, minimum: 1, maximum: 730, default: 90 }
      responses:
        '200':
          description: Upcoming renewals list
          content:
            application/json:
              schema:
                type: object
                required: [success, data, meta]
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/UpcomingRenewalItem' }
                  meta:
                    type: object
                    properties:
                      days:        { type: integer, example: 90 }
                      windowStart: { type: string, format: date-time }
                      windowEnd:   { type: string, format: date-time }
                      count:       { type: integer }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }


  # ── Phase 3 Tier A Reports (v0.85.0) ─────────────────────────────────────────

  /reports/total-addressable-waste:
    get:
      operationId: totalAddressableWaste
      summary: Total addressable waste report
      description: Contracts with low seat utilisation — surfaces licences being paid for but not used.
      tags: [Reports]
      responses:
        '200':
          description: Waste summary with rows, category breakdown, and department breakdown
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /reports/termination-window-violations:
    get:
      operationId: terminationWindowViolations
      summary: Termination window violations report
      description: Auto-renewing contracts where the cancellation deadline is missed, critical (14d), or warning (30d).
      tags: [Reports]
      responses:
        '200':
          description: Violations grouped into missed, critical, and warning buckets
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /reports/license-reclamation-roi:
    get:
      operationId: licenseReclamationRoi
      summary: License reclamation ROI report
      description: Contracts with unused seats — estimates annual savings if unused licences are reclaimed before renewal.
      tags: [Reports]
      responses:
        '200':
          description: Reclamation candidates ranked by savings potential
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /reports/cost-per-active-user:
    get:
      operationId: costPerActiveUser
      summary: Cost-per-active-user report
      description: Annual contract value divided by actively-used seats, with internal category benchmarks.
      tags: [Reports]
      responses:
        '200':
          description: Per-contract cost-per-user rows plus category benchmark table
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /reports/negotiation-effectiveness-by-owner:
    get:
      operationId: negotiationEffectivenessByOwner
      summary: Negotiation effectiveness by owner report
      description: Average savings rate per contract owner compared against portfolio average.
      tags: [Reports]
      responses:
        '200':
          description: Per-owner savings rates and portfolio summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /reports/vendor-negotiation-difficulty:
    get:
      operationId: vendorNegotiationDifficulty
      summary: Vendor negotiation difficulty report
      description: Vendors ranked by difficulty score 0-100 based on historical ask-vs-final-price data.
      tags: [Reports]
      responses:
        '200':
          description: Vendor difficulty scores and tiers
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ── Phase 3 Tier B Reports (v0.86.0) ─────────────────────────────────────────

  /reports/price-escalation-radar:
    get:
      operationId: priceEscalationRadar
      summary: Price escalation radar report
      description: Contracts where current value has grown beyond the original ask, flagged above a configurable threshold.
      tags: [Reports]
      parameters:
        - name: thresholdPct
          in: query
          description: Escalation percentage that triggers a flag (0-200, default 10)
          schema: { type: number, minimum: 0, maximum: 200, default: 10 }
      responses:
        '200':
          description: Escalation rows with flagged status and excess cost
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /reports/multi-year-commitment-risk:
    get:
      operationId: multiYearCommitmentRisk
      summary: Multi-year commitment risk report
      description: Active contracts with terms 24+ months, classified into medium/high/critical tiers.
      tags: [Reports]
      responses:
        '200':
          description: Long-term contracts with lock-in tier and remaining commitment value
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /reports/contract-health-score:
    get:
      operationId: contractHealthScore
      summary: Contract health score report
      description: Every active contract scored 0-100 across four data-quality dimensions. Grade A=80+, B=60-79, C=40-59, D=20-39, F=0-19.
      tags: [Reports]
      responses:
        '200':
          description: Per-contract health scores, grades, and portfolio summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /reports/department-budget-allocation:
    get:
      operationId: departmentBudgetAllocation
      summary: Department budget allocation report
      description: Vendor spend broken down by department with 90-day renewal counts.
      tags: [Reports]
      responses:
        '200':
          description: Department spend summary and contract list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /reports/price-per-seat-benchmark:
    get:
      operationId: pricePerSeatBenchmark
      summary: Price-per-seat benchmark report
      description: Per-seat cost across quantity-based contracts vs. internal category average. Contracts 20%+ above average are flagged as outliers.
      tags: [Reports]
      responses:
        '200':
          description: Per-seat costs with outlier flags and category averages
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /reports/gl-code-spend:
    get:
      operationId: glCodeSpend
      summary: GL code spend breakdown report
      description: Contract spend organised by general ledger code. Contracts without a GL code appear in an untagged bucket.
      tags: [Reports]
      responses:
        '200':
          description: Spend by GL code with contract drill-down list per code
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /reports/walkaway-calculator:
    get:
      operationId: walkawayCalculator
      summary: Walkaway calculator report
      description: Compares renewal cost vs estimated switching cost. Returns renew/borderline/walkaway verdict per contract.
      tags: [Reports]
      parameters:
        - name: horizonMonths
          in: query
          description: How many months ahead to look for renewals (1-24, default 12)
          schema: { type: integer, minimum: 1, maximum: 24, default: 12 }
        - name: switchCostPct
          in: query
          description: Override switch cost as percentage of renewal value (0-100). Omit for category defaults.
          schema: { type: number, minimum: 0, maximum: 100 }
      responses:
        '200':
          description: Per-contract walkaway verdicts and portfolio summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /reports/portfolio-decision-dashboard:
    get:
      operationId: portfolioDecisionDashboard
      summary: Portfolio decision dashboard report
      description: All active contracts with AI negotiation verdicts from the in-session debate cache.
      tags: [Reports]
      responses:
        '200':
          description: Full contract list with AI verdicts and portfolio summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /reports/renewal-win-rate:
    get:
      operationId: renewalWinRate
      summary: Renewal win rate report
      description: Historical ask vs final negotiated price across completed contracts. Returns quarterly trend and top 20 best deals.
      tags: [Reports]
      responses:
        '200':
          description: Quarterly savings trend and best-deal surface
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /reports/contract-ownership:
    get:
      operationId: contractOwnership
      summary: Contract ownership report
      description: Active contracts organised by assigned owner. Surfaces unassigned contracts and overloaded owners (5+ renewals in 90 days).
      tags: [Reports]
      responses:
        '200':
          description: Ownership summary, per-owner rows, and unassigned contract list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
