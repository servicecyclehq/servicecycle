  # ── Exports ──────────────────────────────────────────────────────────────────
  # Export endpoints live at /api/export/* (not /api/v1/*). They use the same
  # session Bearer token as the web UI and return XLSX binary files.
  # Authenticated users only; /activity additionally requires manager or admin role.
  #
  # NOTE: These endpoints use session auth (servicecycle_token cookie / Authorization
  # header set by the web app), NOT a v1 API key. The base URL is /api/export,
  # not /api/v1. Swagger UI's "Try it out" will not work unless you are already
  # logged into the ServiceCycle instance in the same browser session.

  /export/contracts:
    servers:
      - url: https://servicecycle.app/api
        description: Public demo instance
      - url: https://{host}/api
        description: Your self-hosted instance
        variables:
          host:
            default: localhost:3001
    get:
      operationId: exportContracts
      summary: Export contracts as XLSX
      description: |
        Downloads an XLSX spreadsheet of contracts for the authenticated account.
        Supports the same filter parameters as the Contracts list page. Results
        are capped at 1,000 rows; `X-Truncated: 1` is set when the cap is hit.
        Pass `?archived=1` to export archived contracts instead of active ones.

        **Auth**: session Bearer token (from `servicecycle_token`), not a v1 API key.
        **Rate limit**: 10 requests per minute per user (separate from the v1 limit).
      tags: [Exports]
      parameters:
        - name: archived
          in: query
          description: '`1` or `true` to export archived contracts'
          schema: { type: string, enum: ['0','1','true','false'] }
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/ContractStatus' }
        - name: vendorId
          in: query
          schema: { type: string, format: uuid }
        - name: search
          in: query
          schema: { type: string, maxLength: 200 }
        - name: columns
          in: query
          description: >
            Comma-separated column IDs to include. Omit for all columns.
            Valid IDs: vendor, product, contractNumber, customerNumber, poNumber,
            owner, status, startDate, endDate, evaluationStart, cancelBy,
            quantity, costPerLicense, value, autoRenewal, department, reseller, notes
          schema: { type: string }
        - name: vendorIn
          in: query
          description: CSV vendor name exact-matches (column filter)
          schema: { type: string }
        - name: statusIn
          in: query
          description: CSV status exact-matches
          schema: { type: string }
        - name: departmentIn
          in: query
          description: CSV department exact-matches
          schema: { type: string }
        - name: endDateFrom
          in: query
          description: Filter contracts with endDate >= this date (YYYY-MM-DD)
          schema: { type: string, format: date }
        - name: endDateTo
          in: query
          description: Filter contracts with endDate <= this date (YYYY-MM-DD)
          schema: { type: string, format: date }
      responses:
        '200':
          description: XLSX file download
          headers:
            Content-Disposition:
              schema: { type: string, example: 'attachment; filename="Contracts-2026-05-25.xlsx"' }
            X-Truncated:
              description: Set to `1` when result set was capped at 1,000 rows
              schema: { type: string, enum: ['1'] }
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema: { type: string, format: binary }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500':
          description: Export generation failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /export/vendors:
    servers:
      - url: https://servicecycle.app/api
        description: Public demo instance
      - url: https://{host}/api
        description: Your self-hosted instance
        variables:
          host:
            default: localhost:3001
    get:
      operationId: exportVendors
      summary: Export vendors as XLSX
      description: |
        Downloads an XLSX spreadsheet of vendors. Supports the same column-filter
        parameters as the Vendors list page. Capped at 5,000 rows.

        **Auth**: session Bearer token, not a v1 API key.
        **Rate limit**: 10 requests per minute per user.
      tags: [Exports]
      parameters:
        - name: nameIn
          in: query
          description: CSV vendor name exact-matches
          schema: { type: string }
        - name: typeIn
          in: query
          description: CSV vendor type exact-matches
          schema: { type: string }
        - name: complexityIn
          in: query
          description: 'CSV co-term complexity values: none, moderate, complex'
          schema: { type: string }
        - name: contractsMin
          in: query
          schema: { type: integer }
        - name: contractsMax
          in: query
          schema: { type: integer }
        - name: spendMin
          in: query
          schema: { type: number }
        - name: spendMax
          in: query
          schema: { type: number }
        - name: columns
          in: query
          description: >
            Comma-separated column IDs to include. Omit for all columns.
            Valid IDs: name, vendorType, cotermComplexity, contractCount,
            activeSpend, lastContactedAt, cotermNotes
          schema: { type: string }
      responses:
        '200':
          description: XLSX file download
          headers:
            Content-Disposition:
              schema: { type: string, example: 'attachment; filename="Vendors-2026-05-25.xlsx"' }
            X-Truncated:
              description: Set to `1` when result set was capped at 5,000 rows
              schema: { type: string, enum: ['1'] }
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema: { type: string, format: binary }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500':
          description: Export generation failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /export/activity:
    servers:
      - url: https://servicecycle.app/api
        description: Public demo instance
      - url: https://{host}/api
        description: Your self-hosted instance
        variables:
          host:
            default: localhost:3001
    get:
      operationId: exportActivity
      summary: Export activity log as XLSX
      description: |
        Downloads an XLSX spreadsheet of activity log entries. Requires manager
        or admin role. Mirrors the filter parameters of `GET /api/activity`.

        **Auth**: session Bearer token, not a v1 API key.
        **Rate limit**: 10 requests per minute per user.
        **Role**: manager or admin required.
      tags: [Exports]
      parameters:
        - name: actionIn
          in: query
          description: CSV action-type filter (e.g. `contract_created,status_changed`)
          schema: { type: string }
        - name: action
          in: query
          description: Single action type (legacy; `actionIn` takes priority)
          schema: { type: string }
        - name: userIdIn
          in: query
          description: 'CSV user UUID filter; use `__BLANK__` to include system / deleted-user rows'
          schema: { type: string }
        - name: contractId
          in: query
          schema: { type: string, format: uuid }
        - name: dateFrom
          in: query
          schema: { type: string, format: date, example: '2026-01-01' }
        - name: dateTo
          in: query
          schema: { type: string, format: date, example: '2026-12-31' }
        - name: columns
          in: query
          description: 'CSV column IDs: date, action, user, contract, details'
          schema: { type: string }
      responses:
        '200':
          description: XLSX file download
          headers:
            Content-Disposition:
              schema: { type: string, example: 'attachment; filename="ActivityLog-2026-05-25.xlsx"' }
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema: { type: string, format: binary }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Forbidden — manager or admin role required
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500':
          description: Export generation failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ── Work Orders (bi-directional; write requires the `write` scope) ───────────

  /work-orders:
    get:
      operationId: listWorkOrders
      summary: List work orders
      description: Paginated work orders for the account associated with the API key.
      tags: [Work Orders]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          schema: { type: string, enum: [SCHEDULED, IN_PROGRESS, COMPLETE, CANCELLED] }
        - name: assetId
          in: query
          schema: { type: string, format: uuid }
        - name: completedAfter
          in: query
          description: ISO 8601 or YYYY-MM-DD; only work orders completed on/after this date.
          schema: { type: string, example: "2026-01-01" }
      responses:
        '200':
          description: Paginated work-order list
          content:
            application/json:
              schema:
                type: object
                required: [success, data, pagination]
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { type: array, items: { type: object } }
                  pagination: { $ref: '#/components/schemas/Pagination' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }
    post:
      operationId: createWorkOrder
      summary: Create a work order (write-back)
      description: |
        Creates a work order. Requires an API key with the `write` scope.
        When `status` is `COMPLETE` and a `scheduleId` is supplied, the
        originating NFPA 70B maintenance schedule rolls forward (its next-due
        date advances) — closing the CMMS loop.

        Pass an `Idempotency-Key` header to make retries safe: a repeated
        request with the same key replays the original response (with header
        `Idempotent-Replay: true`) and never creates a duplicate.
      tags: [Work Orders]
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          description: Opaque client-supplied key (max 200 chars) for safe retries.
          schema: { type: string, maxLength: 200 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [assetId]
              properties:
                assetId: { type: string, format: uuid }
                scheduleId: { type: string, format: uuid, description: "Active schedule rolled forward on completion." }
                status: { type: string, enum: [SCHEDULED, COMPLETE], default: COMPLETE }
                completedDate: { type: string, description: "ISO 8601 / YYYY-MM-DD; defaults to now when COMPLETE." }
                scheduledDate: { type: string }
                asLeftCondition: { type: string, enum: [C1, C2, C3] }
                netaDecal: { type: string, enum: [GREEN, YELLOW, RED] }
                notes: { type: string, maxLength: 5000 }
      responses:
        '201':
          description: Work order created
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { type: object }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Forbidden — the API key lacks the `write` scope
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Asset or active schedule not found
          content:
            application/json:
