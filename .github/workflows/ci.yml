name: CI

# Runs on every PR and on pushes to non-main branches.
# Checks: TypeScript compile + unit tests + integration tests (real Postgres).
# Required repo secret: none (all env vars are test-safe defaults).

on:
  pull_request:
  push:
    branches-ignore: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tsc + jest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: servicecycle
          POSTGRES_PASSWORD: servicecycle
          POSTGRES_DB: servicecycle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit (SCA)
        # Fail on high/critical CVEs. moderate+ logged but not blocking to
        # avoid dev velocity drag from transitive-dep churn.
        run: npm audit --audit-level=high

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run DB migrations
        env:
          DATABASE_URL: postgresql://servicecycle:servicecycle@localhost:5432/servicecycle_test
        run: npx prisma migrate deploy

      - name: Unit tests (mocked Prisma — no DB)
        run: npx jest --selectProjects unit --ci --forceExit

      - name: Integration tests (real Postgres)
        env:
          TEST_DATABASE_URL: postgresql://servicecycle:servicecycle@localhost:5432/servicecycle_test
          JWT_SECRET: test-secret-minimum-32-chars-long-for-ci-!!
          MASTER_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          EMAIL_MOCK: "true"
          AI_ENABLED: "false"
          DEMO_MODE: ""
        run: npx jest --selectProjects integration --ci --forceExit
