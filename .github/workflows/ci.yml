name: CI

# Runs on every PR and on ALL branch pushes, including main.
# Checks: security audit + TypeScript compile + unit tests + live-server smoke tests.
# Required repo secrets: none (all env vars are test-safe defaults).

on:
  pull_request:
  push:
    branches: ['**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tsc + jest + smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: servicecycle
          POSTGRES_PASSWORD: servicecycle
          POSTGRES_DB: servicecycle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://servicecycle:servicecycle@localhost:5432/servicecycle_test
      JWT_SECRET: test-secret-minimum-32-chars-long-for-ci-!!
      MASTER_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      EMAIL_MOCK: "true"
      AI_ENABLED: "false"
      DEMO_MODE: ""
      NODE_ENV: test
      PORT: "3001"
      # auth.test.js gracefully skips when this doesn't match the seeded password.
      # Set it explicitly so auth tests run (not just skip) in CI.
      SEED_ADMIN_PASSWORD: "Admin1234!"
      # registerB() in tests/_routeHelpers.js self-registers a hostile "B"
      # tenant for every setupTenants()-based suite (see note above). POST
      # /api/auth/register is closed by default (routes/auth.ts H3) and 403s
      # without this — found 2026-07-08 while fixing the live-server suite
      # ordering bug above; without it those 11 suites would still all fail
      # even after being moved to the post-server-start step.
      REGISTRATION_OPEN: "true"
      # tests/_routeHelpers.js gives every suite its own client-IP band (via
      # X-Forwarded-For / CF-Connecting-IP) specifically so 11 suites sharing
      # one server + one jest process (maxWorkers:1) don't trip each other's
      # login/registration rate limits. That isolation only works if the
      # server actually trusts those spoofed-IP headers — found 2026-07-08
      # that without these two, auth.ts keys rate limits on the CI runner's
      # single real req.ip instead, and most of the 11 suites fail with 429s
      # once a couple of suites ahead of them in the run have logged in a
      # few times.
      TRUST_PROXY: "true"
      TRUST_PROXY_SOURCE: "cloudflare"

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Python extractor dependencies
        # tests/extractorGoldenPatterns.test.js and extractorHeaderPatterns.test.js
        # shell out to pyextract/extractor.py (`import pdfplumber`), which was
        # never installed in CI -- found 2026-07-08 chasing an unrelated CI
        # failure. Mirrors the Dockerfile's runtime install (same
        # requirements.txt, same --break-system-packages flag for Ubuntu's
        # PEP-668-locked system Python).
        run: pip install --break-system-packages -r pyextract/requirements.txt

      - name: Security audit (SCA)
        # Fail on high/critical CVEs. moderate+ logged but not blocking to
        # avoid dev velocity drag from transitive-dep churn.
        run: npm audit --audit-level=high

      - name: Generate Prisma client
        # MUST run before "TypeScript check": tsc resolves @prisma/client's
        # generated model types from node_modules, and this used to happen
        # for free because @prisma/client's own postinstall script silently
        # ran `prisma generate` right after `npm ci` -- so by the time tsc
        # ran, the client was already generated (this explicit step just
        # regenerated it redundantly). Found 2026-07-08 the moment
        # ignore-scripts=true was enabled (server/.npmrc): that implicit
        # postinstall-triggered generation stopped happening, tsc ran
        # against the stale/stub client shipped in the npm package, and
        # "TypeScript check" started failing on every push. Moving this step
        # ahead of tsc removes the dependency on that incidental behavior
        # entirely, regardless of the ignore-scripts setting.
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run DB migrations
        run: npx prisma migrate deploy

      - name: Seed database
        # prisma/seed.js is a deliberate no-op (demo seeding moved to
        # scripts/seed-demo.js -- see that file's own header). Kept only so
        # `prisma db seed` / `npm run seed` stay wired up.
        run: node prisma/seed.js

      - name: Seed demo data
        # Creates admin@demo.local (+ manager/viewer/consultant/tech) used by
        # every live-server smoke suite's login() helper, AND is what makes
        # the S8 first-run setup gate (index.ts ~line 1084, checks
        # InstanceConfig.setupCompletedAt) open up: lib/instanceConfig.ts
        # auto-marks the instance configured once an admin user predates the
        # InstanceConfig row, which is true here since this step runs before
        # the server ever boots. Found 2026-07-08 immediately after fixing
        # the "Start API server never listens" bug (see index.ts FORCE_LISTEN
        # comment) -- with no admin seeded, every smoke-suite login got 503
        # "Instance not yet configured", the very next failure point CI had
        # never been able to reach before today.
        #
        # timeout-minutes: measured ~9s locally and in the one all-green CI
        # run (2026-07-08). A dedicated per-step cap (vs. relying on the
        # job's 15min timeout-minutes) means a future hang here fails fast
        # with its OWN "step exceeded max execution time" annotation instead
        # of silently eating the whole job budget -- see the note on
        # "Unit tests" below for why this matters.
        timeout-minutes: 3
        run: node scripts/seed-demo.js

      - name: Unit tests (mocked Prisma — no server needed)
        # The unit jest project stubs out Prisma via moduleNameMapper.
        # Excludes every test that drives the app over real HTTP (supertest
        # against TEST_BASE_URL/localhost:PORT via tests/helpers.js or
        # tests/_routeHelpers.js) — those need a running server and run below
        # after it starts. 2026-07-08: this list previously only had
        # health/auth/aiQuota; 11 newer live-server suites (documentAnnotations,
        # workOrderComments, workOrderTransitions, v1PublicApi, idor, parts,
        # accountExport, loto, quoteRequests, outagePlan, field — added
        # 2026-06-24..07-05) were silently running here with no server up,
        # failing every single push since. CI has been red on every push to
        # main for at least the last 8 commits without anyone noticing —
        # `git log`/PR checks weren't being watched closely enough to catch it.
        #
        # timeout-minutes: added 2026-07-08 diagnosing a recurring job-level
        # 15min timeout (job "tsc + jest + smoke" hit timeout-minutes: 15 on
        # at least 2 independent pushes, both times going completely silent
        # -- not even this step's own "##[group]Run npx jest..." line reached
        # the Actions log -- somewhere between "Seed demo data" finishing and
        # "Stop background server" starting). Local repro of every step in
        # this range (seed, unit tests, server boot, smoke tests) with
        # matching env vars completed in seconds every time, so this is very
        # likely a CI-environment-specific hang (leading theory: a Postgres
        # service-container TCP connection silently dropped with no
        # keepalive, which Prisma's pool won't detect until a query is
        # attempted and which the OS won't time out on its own for a very
        # long time) rather than a deterministic code bug. Root cause is
        # NOT yet confirmed. These three timeout-minutes values are a
        # diagnostic/fail-fast measure, not a fix: next time this happens,
        # GH Actions will report a specific step's timeout (with whatever
        # output it managed to flush) instead of losing 3 steps' worth of
        # output to the job-level kill the way this investigation did.
        timeout-minutes: 3
        run: |
          npx jest --selectProjects unit --ci --forceExit \
            --testPathIgnorePatterns="tests/(health|auth|aiQuota|documentAnnotations|workOrderComments|workOrderTransitions|v1PublicApi|idor|parts|accountExport|loto|quoteRequests|outagePlan|field)\\.test\\.js"

      - name: Start API server (background — needed for smoke tests)
        # health.test.js and auth.test.js call http://localhost:3001 via
        # supertest. helpers.js uses TEST_BASE_URL || http://localhost:PORT.
        # tsx is already installed in node_modules.
        env:
          # index.ts skips app.listen() when NODE_ENV=test (so supertest can
          # attach to the exported app in-process instead, in suites that do
          # that) -- this step needs a REAL listening server for the 14
          # live-server smoke suites' HTTP calls, while keeping the job-level
          # NODE_ENV=test for passwordPolicy.ts's test-mode zxcvbn/HIBP
          # relaxation (the fixture passwords like "Admin1234!" used by these
          # suites would fail a real password policy otherwise). Found
          # 2026-07-08: without this, the server process never listened at
          # all and this step's curl health check timed out after its full
          # 30s every run -- the first time CI ever reached this step.
          FORCE_LISTEN: "true"
        # timeout-minutes + curl --max-time: see "Unit tests" note above --
        # part of the same diagnostic hardening. The curl calls previously had
        # no timeout of their own, so a connection that hangs instead of
        # cleanly refusing/erroring (e.g. the server process stuck mid-boot)
        # could in principle stretch this 30-iteration loop well past its
        # intended ~30s. Bounding each curl call means the loop's worst case
        # is now bounded too, on top of the step-level backstop.
        timeout-minutes: 2
        run: |
          nohup node node_modules/tsx/dist/cli.mjs index.ts \
            > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          echo "Server PID: $(cat /tmp/server.pid)"
          for i in $(seq 1 30); do
            if curl -sf --connect-timeout 5 --max-time 10 http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            echo "  waiting... (${i}s)"
            sleep 1
          done
          curl -sf --connect-timeout 5 --max-time 10 http://localhost:3001/api/health \
            || { echo "--- server log ---"; cat /tmp/server.log; exit 1; }

      - name: Smoke tests (live server + real DB)
        # health, auth, and aiQuota hit the running server / real Postgres.
        # aiQuota self-skips if the DB schema doesn't have the expected tables,
        # but with migrations run above it should pass fully. The 11
        # setupTenants()-based live-server suites (see note in the "Unit
        # tests" step above) belong here too -- they were never reachable by
        # CI before 2026-07-08 because the step above ran before the server
        # existed.
        #
        # timeout-minutes: see "Unit tests" note above. Given the most
        # headroom of the three (6min vs measured low-single-digit-seconds
        # runtime) since it drives 14 suites of real HTTP + real DB traffic.
        timeout-minutes: 6
        run: |
          npx jest --selectProjects unit --ci --forceExit \
            --testPathPatterns="tests/(health|auth|aiQuota|documentAnnotations|workOrderComments|workOrderTransitions|v1PublicApi|idor|parts|accountExport|loto|quoteRequests|outagePlan|field)\.test\.js"

      - name: Stop background server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill "$(cat /tmp/server.pid)" 2>/dev/null || true
          fi

      - name: Print server log on failure
        if: failure()
        run: cat /tmp/server.log || true

  # ─────────────────────────────────────────────────────────────────────────
  # Client production build — catches broken imports, missing env vars,
  # and Vite/Rollup bundling errors before they reach the server.
  # Runs in parallel with the test job to keep wall-clock time low.
  # ─────────────────────────────────────────────────────────────────────────
  build-client:
    name: Client build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Production build
        run: npm run build
        working-directory: client
        env:
          # The client uses relative /api paths in production (Caddy proxies).
          # Provide a placeholder so any VITE_API_URL guard in the build config
          # doesn't error. The actual value is irrelevant for build correctness.
          VITE_API_URL: https://servicecycle.app
