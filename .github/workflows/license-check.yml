name: License compliance

# M&A / legal due-diligence: dependency license inventory + a CI gate that
# fails on copyleft (GPL/AGPL) licenses in shipped (production) dependencies.
#
# Tool: license-checker-rseidelsohn, PINNED to the 4.x line. v5 requires
# Node >= 24 with engine-strict; this repo's CI runs Node 20, so 4.x is the
# compatible line. (Bumping to v5 later means adding a Node 22+/24 step.)
#
# GATE CORRECTNESS NOTE: --failOn matches EXACT SPDX identifiers, not families.
# `--failOn 'GPL;AGPL'` does NOT catch `GPL-3.0-or-later` (verified empirically),
# so the copyleft variants are enumerated below. LGPL is intentionally excluded
# (weak copyleft), and permissive-OR-copyleft duals like `(MIT OR GPL-3.0-or-later)`
# are correctly NOT blocked (the permissive option is choosable).

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  LC_VERSION: '4.4.2'
  FAIL_ON: 'GPL-1.0-only;GPL-1.0-or-later;GPL-2.0-only;GPL-2.0-or-later;GPL-3.0-only;GPL-3.0-or-later;GPL-1.0;GPL-2.0;GPL-3.0;AGPL-1.0-only;AGPL-1.0-or-later;AGPL-3.0-only;AGPL-3.0-or-later;AGPL-1.0;AGPL-3.0'

jobs:
  license-check:
    name: License gate + DD inventory
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        target: [server, client, sdk]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.target }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.target }}

      - name: License gate — fail on GPL/AGPL in production deps
        run: npx --yes "license-checker-rseidelsohn@${LC_VERSION}" --production --failOn "${FAIL_ON}"
        working-directory: ${{ matrix.target }}

      - name: Generate DD license inventory (JSON + summary)
        # Runs even if the gate failed, so the data-room artifact is always produced.
        if: always()
        run: |
          npx --yes "license-checker-rseidelsohn@${LC_VERSION}" --json --out licenses.json
          npx --yes "license-checker-rseidelsohn@${LC_VERSION}" --summary > licenses-summary.txt
        working-directory: ${{ matrix.target }}

      - name: Upload license inventory artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: licenses-${{ matrix.target }}-${{ github.sha }}
          path: |
            ${{ matrix.target }}/licenses.json
            ${{ matrix.target }}/licenses-summary.txt
          retention-days: 90
