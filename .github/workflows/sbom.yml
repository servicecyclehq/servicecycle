name: SBOM (auto-generate)

# SOC 2 CC7.1 — software bill of materials for supply-chain transparency.
# Generates CycloneDX SBOMs for server and client on every push to main,
# and on every release tag. Uploads as workflow artifacts (30-day retention)
# and commits `server/sbom/cyclonedx.json` refreshed via the manual "sbom:sync"
# path.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        target: [server, client]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.target }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.target }}

      - name: Generate CycloneDX SBOM
        # Use @cyclonedx/cyclonedx-npm which is the CycloneDX-maintained tool.
        # Fallback to @cyclonedx/bom if the newer package isn't available.
        run: |
          npx --yes @cyclonedx/cyclonedx-npm@2 \
            --output-file "cyclonedx.json" \
            --output-format JSON \
            || npx --yes @cyclonedx/bom@4 \
              --output "cyclonedx.json"
        working-directory: ${{ matrix.target }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.target }}-${{ github.sha }}
          path: ${{ matrix.target }}/cyclonedx.json
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────
  # SPDX SBOM (Trivy) — CycloneDX above is the security-tooling norm; SPDX
  # is what M&A / legal due-diligence reads for license provenance. Trivy
  # walks the lockfiles (no node_modules needed) and emits SPDX-JSON.
  # ─────────────────────────────────────────────────────────────────────
  spdx:
    name: Generate SPDX SBOM (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Generate SPDX-JSON SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: spdx-json
          output: sbom.spdx.json
          # node_modules excluded — dependency graph comes from lockfiles,
          # not installed trees. Mirrors trivy.yml fs-scan skip-dirs.
          skip-dirs: 'node_modules,client/node_modules,server/node_modules,sdk/node_modules,client/dist,server/dist'

      - name: Upload SPDX SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx-${{ github.sha }}
          path: sbom.spdx.json
          retention-days: 90
