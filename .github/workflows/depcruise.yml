name: dependency-cruiser (boundaries — report only)

# Enforces architectural boundaries (server !-> client, client !-> server,
# sdk standalone) and flags circular dependencies. Config: .dependency-cruiser.cjs
#
# REPORT-ONLY / NON-BLOCKING for now (continue-on-error). The boundary and
# no-circular rules currently pass with 0 errors on the baseline — once that's
# confirmed stable they're a good candidate to promote to a blocking gate.

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  depcruise:
    name: Import boundaries + cycles
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install analyzed workspace deps (server, client, sdk)
        # Needed for TS parsing / import resolution.
        run: |
          npm ci --prefix server
          npm ci --prefix client
          npm ci --prefix sdk

      - name: Run dependency-cruiser (non-blocking report)
        continue-on-error: true
        run: |
          npx --yes dependency-cruiser@17 server client sdk \
            --config .dependency-cruiser.cjs \
            --output-type err | tee depcruise-report.txt

      - name: Publish report to job summary
        if: always()
        run: |
          {
            echo '### dependency-cruiser report (report-only — does not fail CI)';
            echo '```';
            cat depcruise-report.txt || echo '(no report produced)';
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dependency-cruiser report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: depcruise-report-${{ github.sha }}
          path: depcruise-report.txt
          retention-days: 30
