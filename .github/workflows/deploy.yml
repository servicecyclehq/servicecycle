name: Deploy to ServiceCycle droplet

# CI (workflow "CI", .github/workflows/ci.yml) completing successfully on
# main -> auto-deploy server + client to the live demo (servicecycle.app).
# Add "[skip deploy]" to a commit message to push without deploying (checked
# against the commit that triggered the CI run, since workflow_run events
# carry no head_commit of their own on this event).
# Or trigger manually from the Actions tab (Run workflow) — bypasses the CI
# gate entirely, same as before.
#
# 2026-07-08 acquisition audit (CIO High): deploy previously triggered on
# EVERY push to main with NO dependency on the CI workflow's outcome — CI was
# red on 8+ consecutive pushes while auto-deploy kept shipping anyway. Gated
# via workflow_run + an explicit conclusion check, the standard GH Actions
# pattern for chaining one workflow on another's result.
#
# Required repo secrets (Settings > Secrets and variables > Actions):
#   SC_SSH_KEY   - private deploy key (no passphrase) authorized on the droplet
#   SC_SSH_HOST  - 198.211.99.45
#   SC_SSH_USER  - root

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sc-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       !contains(github.event.workflow_run.head_commit.message, '[skip deploy]'))
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # SOC 2 CC8.1 — environment gate.
    # Once the `production` environment is created in Settings → Environments,
    # any protection rules (required reviewers, wait timer) automatically apply.
    # If the environment does not exist, the job runs immediately with no gate,
    # so this line is a no-op until the environment is configured. Setup steps
    # in docs/security/GITHUB_ADMIN_SETUP.md §4.
    # 2026-07-08 audit: this environment still needs to be CREATED in GitHub
    # Settings → Environments by a repo admin — that's an admin-only toggle
    # this change can't flip on its own. Referencing it here means the gate
    # activates automatically the moment someone with access creates it.
    environment: production
    # Single source of truth for "the commit actually being deployed" --
    # reused by the image-tagging step below (rollback.yml retags/restarts
    # from this exact SHA) and echoed into step logs for auditability.
    # workflow_run carries no head_commit for a manual (workflow_dispatch)
    # run, so this falls back to github.sha (the SHA of the ref that was
    # selected when the run was dispatched) -- deliberately NOT the same
    # fallback the checkout step below uses (github.ref, a branch name, not
    # a SHA -- fine for checkout, useless as an image tag).
    env:
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      # TODO: pin to SHA digest for supply chain security
      - uses: actions/checkout@v4
        with:
          # workflow_run checkouts default to the workflow FILE's ref (the
          # branch that's currently on main HEAD), not necessarily the exact
          # commit CI just validated. Pin explicitly to the commit CI ran
          # against so what's deployed is provably what passed CI. Falls back
          # to github.ref for the workflow_dispatch (manual) trigger, which
          # has no workflow_run context.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Node
        # TODO: pin to SHA digest for supply chain security
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Build client SPA
        working-directory: client
        env:
          VITE_API_URL: ''
        run: |
          set -euo pipefail
          npm ci
          npm run build
          test -f dist/index.html || { echo "client build produced no dist/index.html"; exit 1; }

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SC_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.SC_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<EOF
          Host sc
            HostName ${{ secrets.SC_SSH_HOST }}
            User ${{ secrets.SC_SSH_USER }}
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
          EOF

      - name: Pre-deploy DB backup
        # `|| echo ... (continuing)` is intentional: a failed pre-deploy dump
        # shouldn't block deploy, it's a best-effort extra safety copy on top
        # of the real nightly encrypted backup (lib/backup.ts). set -euo
        # pipefail still applies to the rest of this step if it ever grows
        # more than the one guarded line.
        run: |
          set -euo pipefail
          ssh sc "docker exec servicecycle-db pg_dump -U servicecycle -d servicecycle | gzip > /root/predeploy-ci-$(date +%Y%m%d-%H%M%S).sql.gz" || echo "WARN: backup step failed (continuing)"

      - name: Deploy server (rsync source + rebuild container)
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude node_modules --exclude .env --exclude uploads --exclude backups \
            --exclude 'pyextract/__pycache__' \
            server/ sc:/root/ServiceCycle/server/
          ssh sc "cd /root/ServiceCycle && docker compose up -d --build server"

      - name: Deploy client (backup web root + sync dist)
        run: |
          set -euo pipefail
          ssh sc "cp -a /var/www/servicecycle/html /root/html-backup-ci-$(date +%Y%m%d-%H%M%S)"
          rsync -az --delete --exclude '.well-known' client/dist/ sc:/var/www/servicecycle/html/

      - name: Health check
        run: |
          set -euo pipefail
          sleep 15
          # The droplet's .env sets SERVER_PORT=3002 (host-side mapping; the
          # container listens on 3001 internally). 3001 on the host 404s.
          # 2026-07-08 audit: checks /api/ready (real prisma $queryRaw SELECT
          # 1) instead of /api/health (liveness only — returns 200 even
          # during a DB outage, per the audit's DevOps finding).
          code=$(ssh sc "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3002/api/ready")
          echo "api/ready -> HTTP $code"
          test "$code" = "200" || { echo "Health check failed"; exit 1; }
          ssh sc "docker ps --filter name=servicecycle-server --format '{{.Names}} {{.Status}}'"

      - name: Tag server image with commit SHA (rollback candidate)
        # Only runs if the Health check step above passed (no `if:` means
        # "default to on success"), by design: a build that failed its own
        # post-deploy health check should never be marked as something
        # rollback.yml can roll INTO later. Prior successful deploys' sha-*
        # tags are untouched by this run's `docker compose up -d --build`
        # (rebuilding only moves the floating default-name tag; it doesn't
        # delete or overwrite other tags pointing at the old image layers),
        # so even a failed deploy here leaves the last known-good SHA tag
        # intact and rollback-able.
        #
        # `docker compose config --images server` resolves the exact image
        # name Compose just built `server` under -- this base
        # docker-compose.yml has no `image:` key on the server service, so
        # Compose auto-derives one from the project dir name
        # (/root/ServiceCycle -> project "servicecycle" -> image
        # "servicecycle-server" under Compose v2's current default naming).
        # Asking Compose directly instead of hardcoding that convention here
        # means this keeps working even if the project directory name or
        # Compose version ever changes -- see the rollback.yml header for
        # the "don't guess the tag" reasoning in full.
        #
        # `docker tag` just adds a second name to the same image ID/layers
        # (no data duplication), so this costs ~0 extra disk per deploy.
        run: |
          set -euo pipefail
          ssh sc "cd /root/ServiceCycle && IMAGE=\$(docker compose config --images server) && docker tag \$IMAGE servicecycle-server:sha-$DEPLOY_SHA && echo Tagged \$IMAGE as servicecycle-server:sha-$DEPLOY_SHA"

      - name: Prune old pre-deploy dump artifacts
        # 2026-07-08 audit (DevOps Low — "unencrypted pg_dump artifacts
        # accumulating in /root"): the "Pre-deploy DB backup" step above has
        # written a plaintext-gzip predeploy-ci-*.sql.gz on every deploy since
        # it was added, with nothing ever cleaning them up — live prod health
        # checks flagged disk at 77% used partly because of this. These are a
        # best-effort pre-deploy safety net on top of the REAL nightly
        # encrypted backup (lib/backup.ts, BACKUP_ENCRYPT=true by default), so
        # pruning to a short rolling window (rather than wiring cross-runtime
        # encryption into a raw ssh/bash pipeline for a redundant copy) is the
        # right effort/risk trade here. Keeps the 5 most recent; runs even if
        # an earlier step failed so a bad deploy doesn't also leave the
        # droplet's disk filling up unbounded.
        if: always()
        run: |
          set -euo pipefail
          ssh sc "cd /root && ls -t predeploy-ci-*.sql.gz 2>/dev/null | tail -n +6 | xargs -r rm -f --" || echo "WARN: prune step failed (non-fatal, will retry next deploy)"

      - name: Prune old server image tags
        # Unbounded-growth guard for the sha-* tags the "Tag server image"
        # step above adds on every successful deploy -- same disk-growth
        # pattern the predeploy-ci-*.sql.gz prune step above already exists
        # to guard against (2026-07-08 audit flagged /root at 77% disk used
        # partly from exactly this kind of unpruned per-deploy artifact),
        # applied here to image tags instead of dump files. Keeps the 5 most
        # recent by image CREATION TIME (docker images --format
        # '{{.CreatedAt}}|{{.Tag}}', sorted on the whole line so CreatedAt --
        # the leftmost field -- drives the order) and removes the rest. A
        # plain alphabetical sort of the SHA strings themselves would be
        # meaningless (git SHAs aren't chronological), hence sorting on
        # CreatedAt explicitly rather than mirroring the dump-artifact
        # step's simpler `ls -t` (which works there because *filenames*
        # embed a real timestamp; image tags here don't).
        #
        # Deliberately narrow, per the 2 vCPU / ~2 GB droplet's tight disk
        # budget and the acquisition-audit's "unbounded artifact growth"
        # finding: only ever touches tags matching `servicecycle-server:sha-*`
        # via an explicit grep filter -- never a blanket `docker image prune`
        # / `docker system prune` (which would also sweep build cache/layers
        # this step has no business touching), and never the floating
        # default tag (which always points at whatever build is currently
        # live, and is managed by `docker compose up -d --build`, not this
        # step). `if: always()` so a failed deploy this run still gets its
        # disk cleaned up, same rationale as the dump-artifact prune step.
        if: always()
        run: |
          set -euo pipefail
          ssh sc "docker images --format '{{.CreatedAt}}|{{.Tag}}' servicecycle-server | grep '|sha-' | sort -r | tail -n +6 | cut -d'|' -f2 | xargs -r -I{} docker rmi servicecycle-server:{}" || echo "WARN: image prune step failed (non-fatal, will retry next deploy)"

      - name: Prune old client html backups
        # Same unbounded-growth pattern as the two prune steps above,
        # applied to the timestamped `cp -a` snapshots the "Deploy client"
        # step takes before every overwrite -- these have accumulated in
        # /root, uncapped, since the backup line was first added, same as
        # the predeploy-ci-*.sql.gz files were before the step above. Keeps
        # the 5 most recent by mtime (`ls -dt`, matching the sql.gz step's
        # own approach -- `-d` so directory entries are listed themselves,
        # not their contents) and removes the rest with `rm -rf` (these are
        # directories, not files, so plain `rm -f` wouldn't remove them).
        #
        # These backups are a rollback SAFETY NET, not the only copy of
        # anything -- the live html tree is reproducible by re-running the
        # client build against the matching git SHA -- so pruning to a short
        # rolling window is the same acceptable trade-off already made for
        # the DB dumps and image tags above. rollback.yml's client-restore
        # step depends on a recent backup still being present, which is
        # exactly why this keeps 5 rather than 1.
        if: always()
        run: |
          set -euo pipefail
          ssh sc "cd /root && ls -dt html-backup-ci-* 2>/dev/null | tail -n +6 | xargs -r rm -rf --" || echo "WARN: prune step failed (non-fatal, will retry next deploy)"
