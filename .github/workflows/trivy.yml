name: Trivy (container + fs scan)

# SOC 2 CC7.1 — vulnerability scanning of container image, OS packages,
# and filesystem dependencies. Trivy is free and open-source.
#
# Two jobs:
#   1. fs-scan  — scans the repository filesystem for CVEs in package manifests.
#                 Runs on every push and PR.
#   2. image-scan — builds the server Docker image and scans it for OS-package
#                   and app-dependency CVEs. Runs on push to main + weekly.
#
# Both jobs fail on HIGH/CRITICAL findings, with an ignorable-findings file
# at `.trivyignore` for accepted risks (documented in
# `docs/security/DEPENDENCY_DECISIONS.md` when they arise).

on:
  push:
    branches: ['**']
  pull_request:
  schedule:
    # Weekly deep scan on Tuesday 07:00 UTC — catches newly-disclosed CVEs
    # in dependencies that haven't changed since last commit.
    - cron: '0 7 * * 2'

concurrency:
  group: trivy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Filesystem scan — fast, runs on every push
  # ─────────────────────────────────────────────────────────────────────
  fs-scan:
    name: Filesystem scan (package manifests)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          # Vuln + misconfig only; secret scanning is handled by Gitleaks
          # (.github/workflows/gitleaks.yml). Running both catches placeholder
          # form strings as false positives.
          scanners: vuln,misconfig
          severity: HIGH,CRITICAL
          exit-code: '1'
          # [2026-07-05 review fix] ignore-unfixed removed from fs-scan (kept
          # on image-scan below). "Unfixed" makes sense for OS packages baked
          # into a base image, where there's genuinely nothing to do but wait
          # for upstream. It does NOT make sense for OUR OWN package.json/
          # requirements.txt dependencies -- those almost always have an
          # available bump, and Trivy's advisory-DB attribution of "fixed
          # version" lags real releases (this is exactly the pillow CVE case
          # being evaluated separately). Silently ignoring "unfixed" findings
          # here was masking actionable dependency bumps as if they were the
          # same kind of "nothing we can do" as an OS package CVE.
          skip-dirs: 'node_modules,client/node_modules,server/node_modules,client/dist,server/dist'
          format: table

      - name: Upload Trivy results (SARIF)
        # Runs even on failure so findings show up in Security tab.
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          severity: HIGH,CRITICAL
          skip-dirs: 'node_modules,client/node_modules,server/node_modules,client/dist,server/dist'
          format: sarif
          output: trivy-fs.sarif

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4.37.1
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ─────────────────────────────────────────────────────────────────────
  # Image scan — builds the actual prod image and scans it.
  # Runs on push to main + weekly (not on every branch push, to keep CI fast).
  # ─────────────────────────────────────────────────────────────────────
  image-scan:
    name: Container image scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        # Use the same Dockerfile as prod so scan reflects reality.
        run: docker build -t servicecycle-server:scan -f server/Dockerfile server

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: servicecycle-server:scan
          scanners: vuln,misconfig
          severity: HIGH,CRITICAL
          exit-code: '1'
          # Ignore unfixed CVEs — nothing we can do about them at scan time.
          ignore-unfixed: true
          # Skip npm's OWN bundled node_modules (usr/local/lib/node_modules/npm
          # ships with the node:20-slim base image; we don't ship or import them).
          skip-files: 'usr/local/lib/node_modules/npm/**'
          format: table

      - name: Upload Trivy image results (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: servicecycle-server:scan
          scanners: vuln,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          skip-files: 'usr/local/lib/node_modules/npm/**'
          format: sarif
          output: trivy-image.sarif

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4.37.1
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
