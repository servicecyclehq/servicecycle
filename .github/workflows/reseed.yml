name: Nightly demo reseed

# Reseeds the live demo (servicecycle.app) every night so drift from demo
# visitors (created/edited/deleted records) never survives more than a day.
# 08:00 UTC = 03:00 EST / 04:00 EDT — quiet hours for a US-audience demo.
# Can also be triggered manually from the Actions tab (Run workflow).
#
# The seed is DESTRUCTIVE for the demo account (wipes + recreates it) and
# takes ~7 minutes. It prints "Demo seed complete" on success — the ssh/
# docker exit code alone has mislabeled runs in both directions before, so
# the job gates on that marker string, not on the exit code.
#
# Required repo secrets (same as deploy.yml):
#   SC_SSH_KEY   - private deploy key (no passphrase) authorized on the droplet
#   SC_SSH_HOST  - 198.211.99.45
#   SC_SSH_USER  - root

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

# Share the deploy.yml concurrency group so a nightly reseed can never run
# in the middle of a deploy (and vice versa) — they queue instead.
concurrency:
  group: sc-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  reseed:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SC_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.SC_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<EOF
          Host sc
            HostName ${{ secrets.SC_SSH_HOST }}
            User ${{ secrets.SC_SSH_USER }}
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
          EOF

      - name: Run demo reseed
        timeout-minutes: 20
        run: |
          # Capture output but do NOT fail on exit code — the seed has
          # reported "failed" while actually succeeding (and could do the
          # reverse). The authoritative success signal is the marker string
          # the seed prints as its final line: "Demo seed complete".
          set +e
          out=$(ssh sc "cd /root/ServiceCycle && docker compose exec -T server node scripts/seed-demo.js" 2>&1)
          status=$?
          set -e
          echo "$out"
          echo "ssh/docker exit code: $status (informational only)"
          if ! printf '%s' "$out" | grep -q "Demo seed complete"; then
            echo "FAIL: success marker 'Demo seed complete' not found in seed output"
            exit 1
          fi
          echo "OK: seed success marker found"

      - name: Health check
        run: |
          sleep 15
          # The droplet's .env sets SERVER_PORT=3002 (host-side mapping; the
          # container listens on 3001 internally). 3001 on the host 404s.
          code=$(ssh sc "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3002/api/health")
          echo "api/health -> HTTP $code"
          test "$code" = "200" || { echo "Health check failed"; exit 1; }
          ssh sc "docker ps --filter name=servicecycle-server --format '{{.Names}} {{.Status}}'"
