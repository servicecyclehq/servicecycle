version: 2

updates:
  # Server npm dependencies
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
    # Group patch + minor updates to reduce PR noise; major versions always
    # get individual PRs so breaking changes are reviewed separately.
    groups:
      patch-and-minor:
        update-types:
          - minor
          - patch

  # Client npm dependencies
  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
    groups:
      patch-and-minor:
        update-types:
          - minor
          - patch

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(ci)"
