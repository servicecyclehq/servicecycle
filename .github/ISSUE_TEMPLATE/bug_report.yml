name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: A clear description of the bug — what you saw vs. what you expected.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Production (servicecycle.app)
        - Local dev
        - Other
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser / runtime
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Node.js (API)
        - Other
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "Critical — data loss or security issue"
        - "High — feature broken, no workaround"
        - "Medium — feature degraded, workaround exists"
        - "Low — cosmetic or minor"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error messages / logs
      description: Paste any relevant console errors or server logs.
      render: shell
    validations:
      required: false
