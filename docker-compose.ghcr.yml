# ============================================================================
# ServiceCycle — GHCR image variant (used by scripts/install.sh)
# ============================================================================
#
# Identical service shape to docker-compose.yml but pulls pre-built images
# from ghcr.io instead of building from source. Used by the one-line
# installer so customers don't need a copy of the repo to run ServiceCycle.
#
# To run from source for development, use the root docker-compose.yml
# (it has `build: ./server` / `build: ./client` instead of `image:`).
# ============================================================================

services:

  # S4-FN-01 (v0.75.x): init container for database migrations.
  # Runs npx prisma migrate deploy once and exits 0 on success.
  # The server service waits for service_completed_successfully so a
  # failed migration leaves the API un-started (clean failure) rather
  # than crash-looping. restart: "no" prevents Docker from retrying.
  server-migrate:
    image: ghcr.io/${GHCR_OWNER:-servicecyclehq}/servicecycle-server:${SERVICECYCLE_VERSION:-latest}
    container_name: servicecycle-server-migrate
    restart: "no"
    command: ["sh", "/app/entrypoint.migrate.sh"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-servicecycle}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-servicecycle}
      MASTER_KEY:   ${MASTER_KEY:?MASTER_KEY must be set in .env (44-char base64 of 32 random bytes)}
      NODE_ENV:     ${NODE_ENV:-production}

  db:
    image: postgres:16-alpine
    container_name: servicecycle-db
    # v0.35.3 -> v0.36.6: Pass-6 container hardening on the db service was
    # rolled back in v0.35.3 because postgres:16-alpine's docker-entrypoint.sh
    # chmods /var/lib/postgresql/data on every start, which fails under
    # cap_drop:ALL + read_only:true (operation not permitted). The existing
    # data volume was created with v0.34-era permissions; the new constraints
    # don't permit postgres to re-chown/chmod on bind.
    #
    # v0.36.6 partial-restore (Pass-6 Pass-2 P0-R3 / Pass-4 B-L4-01 fix path 1):
    # no-new-privileges:true is re-enabled below because it has zero entrypoint
    # compatibility issue. The cap_drop:ALL + cap_add:[CHOWN, DAC_OVERRIDE,
    # SETUID, SETGID, FOWNER] + read_only:true block remains deferred to a
    # follow-up release that tests against the postgres entrypoint on a fresh
    # data volume (see audit/pass-6/p6-pass4-compliance/layer_4_security_
    # architecture.md B-L4-01 fix path 2).
    security_opt:
      - "no-new-privileges:true"
    pids_limit: 256
    mem_limit: 1g
    ulimits:
      nofile:
        soft: 4096
        hard: 4096
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-servicecycle}
      POSTGRES_USER:     ${POSTGRES_USER:-servicecycle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    # Pass-6 hardening — see docker-compose.yml for rationale.
    command:
      - "postgres"
      - "-c"
      - "statement_timeout=30s"
      - "-c"
      - "idle_in_transaction_session_timeout=60s"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-servicecycle} -d ${POSTGRES_DB:-servicecycle}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    image: ghcr.io/${GHCR_OWNER:-servicecyclehq}/servicecycle-server:${SERVICECYCLE_VERSION:-latest}
    container_name: servicecycle-server
    # Pass-6 container hardening — see db service for rationale. /tmp is
    # tmpfs so sharp/prisma/ephemeral writes still work on a read-only root.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    pids_limit: 256
    mem_limit: 1g
    ulimits:
      nofile:
        soft: 4096
        hard: 4096
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      # S4-FN-01 (v0.75.x): wait for migrations to complete before starting the API.
      # server-migrate exits 0 on success; if it fails the API never starts.
      server-migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    # Host-port binding defaults to 127.0.0.1 (defense-in-depth, 2026-05-12):
    # operators running this compose file behind their own reverse proxy
    # (Caddy, nginx, Traefik, etc.) almost always want loopback-only on the
    # host, not a public 0.0.0.0 listener. For dev or for explicit public
    # exposure without a proxy, override `SERVICECYCLE_HOST_BIND=0.0.0.0` in .env.
    # docker-compose.demo.yml further pins this to 127.0.0.1:13001:3001 via
    # `ports: !override` so even if this default is changed accidentally,
    # the demo deploy stays loopback-only.
    ports:
      - "${SERVICECYCLE_HOST_BIND:-127.0.0.1}:${SERVER_PORT:-3001}:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-servicecycle}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-servicecycle}
      JWT_SECRET:   ${JWT_SECRET:?JWT_SECRET must be set in .env (>=32 chars)}
      MASTER_KEY:   ${MASTER_KEY:?MASTER_KEY must be set in .env (44-char base64 of 32 random bytes)}
      CLIENT_URL:   ${CLIENT_URL:-http://localhost:5173}
      NODE_ENV:     ${NODE_ENV:-production}
      CORP_POLICY:  ${CORP_POLICY:-same-site}
      TRUST_PROXY:  ${TRUST_PROXY:-true}
      DEMO_MODE:    ${DEMO_MODE:-false}
      REGISTRATION_OPEN: ${REGISTRATION_OPEN:-false}
      CSP_REPORT_ONLY:   ${CSP_REPORT_ONLY:-false}
      JWT_EXPIRES_IN:    ${JWT_EXPIRES_IN:-}
      ACTIVITY_LOG_RETENTION_DAYS: ${ACTIVITY_LOG_RETENTION_DAYS:-}
      BACKUP_LOG_RETENTION_DAYS:   ${BACKUP_LOG_RETENTION_DAYS:-}
      BACKUP_ENCRYPT: ${BACKUP_ENCRYPT:-true}

      STORAGE_DEST:               ${STORAGE_DEST:-local}
      STORAGE_S3_BUCKET:          ${STORAGE_S3_BUCKET:-}
      STORAGE_S3_REGION:          ${STORAGE_S3_REGION:-}
      STORAGE_S3_ACCESS_KEY_ID:   ${STORAGE_S3_ACCESS_KEY_ID:-}
      STORAGE_S3_SECRET_ACCESS_KEY: ${STORAGE_S3_SECRET_ACCESS_KEY:-}
      STORAGE_S3_ENDPOINT:        ${STORAGE_S3_ENDPOINT:-}

      BACKUP_DEST:               ${BACKUP_DEST:-local}
      BACKUP_S3_BUCKET:          ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_REGION:          ${BACKUP_S3_REGION:-}
      BACKUP_S3_KEY_ID:          ${BACKUP_S3_KEY_ID:-}
      BACKUP_S3_SECRET:          ${BACKUP_S3_SECRET:-}
      BACKUP_S3_ENDPOINT:        ${BACKUP_S3_ENDPOINT:-}

      # Better Stack (Logtail) log shipping — optional
      BETTERSTACK_INGEST_URL:    ${BETTERSTACK_INGEST_URL:-}
      BETTERSTACK_SOURCE_TOKEN:  ${BETTERSTACK_SOURCE_TOKEN:-}
      BETTERSTACK_DEBUG:         ${BETTERSTACK_DEBUG:-}

      # Healthchecks.io cron heartbeats — optional. Set the project Ping Key
      # to auto-provision a check per cron name on first ping. Per-check URL
      # overrides (HEALTHCHECKS_URL_*) are also supported but not whitelisted
      # here by default — add explicit entries when needed.
      HEALTHCHECKS_PING_KEY:     ${HEALTHCHECKS_PING_KEY:-}
      HEALTHCHECKS_DEBUG:        ${HEALTHCHECKS_DEBUG:-}

      ENCRYPT_DOCS: ${ENCRYPT_DOCS:-false}

      EMAIL_MOCK:     ${EMAIL_MOCK:-true}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      EMAIL_FROM:     ${EMAIL_FROM:-}
      SUPPORT_EMAIL:  ${SUPPORT_EMAIL:-}

      SLACK_ENABLED:     ${SLACK_ENABLED:-false}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SLACK_MOCK:        ${SLACK_MOCK:-false}

      AI_ENABLED:    ${AI_ENABLED:-false}
      AI_PROVIDER:   ${AI_PROVIDER:-anthropic}
      AI_API_KEY:    ${AI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MODEL:      ${AI_MODEL:-}
      AI_MODEL_OVERRIDE:     ${AI_MODEL_OVERRIDE:-}
      AI_DAILY_CAP_PER_USER: ${AI_DAILY_CAP_PER_USER:-}
      AI_DAILY_CAP_PER_USER_EXTRACT:      ${AI_DAILY_CAP_PER_USER_EXTRACT:-}
      AI_DAILY_CAP_PER_USER_ASK:          ${AI_DAILY_CAP_PER_USER_ASK:-}
      AI_DAILY_CAP_PER_USER_BRIEF:        ${AI_DAILY_CAP_PER_USER_BRIEF:-}
      AI_DAILY_CAP_PER_USER_BRIEF_SEARCH: ${AI_DAILY_CAP_PER_USER_BRIEF_SEARCH:-}

      AZURE_OPENAI_API_KEY:    ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT:   ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}

      # v0.35.0 — Cloudflare Workers AI primary + HF/Groq cascade fallbacks.
      # Required for AI_PROVIDER=cloudflare; ignored otherwise. HF_TOKEN +
      # GROQ_API_KEY are only consulted when the cascade fires (chat/classify
      # tasks; extract/brief never cascade per spec).
      CF_WORKERS_AI_ACCOUNT_ID: ${CF_WORKERS_AI_ACCOUNT_ID:-}
      CF_WORKERS_AI_API_KEY:    ${CF_WORKERS_AI_API_KEY:-}
      CF_WORKERS_AI_TIMEOUT_MS: ${CF_WORKERS_AI_TIMEOUT_MS:-}
      HF_TOKEN:                 ${HF_TOKEN:-}
      HF_MODEL:                 ${HF_MODEL:-}
      GROQ_API_KEY:             ${GROQ_API_KEY:-}
      GROQ_MODEL:               ${GROQ_MODEL:-}
      AI_BUDGET_MONTHLY_USD:    ${AI_BUDGET_MONTHLY_USD:-}
      AI_BUDGET_ALERT_PCT:      ${AI_BUDGET_ALERT_PCT:-}
      AI_BUDGET_HARDSTOP_PCT:   ${AI_BUDGET_HARDSTOP_PCT:-}
      AI_DISABLED_PROVIDERS:    ${AI_DISABLED_PROVIDERS:-}
      AI_VISION_PROVIDER:       ${AI_VISION_PROVIDER:-}
      OPENAI_API_KEY:           ${OPENAI_API_KEY:-}
      GEMINI_API_KEY:           ${GEMINI_API_KEY:-}

      NEWS_SCANNER_ENABLED: ${NEWS_SCANNER_ENABLED:-true}
      NEWS_SCANNER_AI_CLASSIFY: ${NEWS_SCANNER_AI_CLASSIFY:-true} # v0.89.5
      SERVICECYCLE_VERSION: ${SERVICECYCLE_VERSION:-unknown} # v0.90.1 - reported by /api/errors/render telemetry

      STRIPE_ENABLED:             ${STRIPE_ENABLED:-false}
      STRIPE_SECRET_KEY:          ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET:      ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID_SMALL:      ${STRIPE_PRICE_ID_SMALL:-}
      STRIPE_PRICE_ID_MID:        ${STRIPE_PRICE_ID_MID:-}
      STRIPE_PRICE_ID_ENTERPRISE: ${STRIPE_PRICE_ID_ENTERPRISE:-}

      DEMO_MAX_ACCOUNTS:        ${DEMO_MAX_ACCOUNTS:-}
      DEMO_INACTIVITY_TTL_DAYS: ${DEMO_INACTIVITY_TTL_DAYS:-}

      PORT: 3001
    volumes:
      - ./uploads:/app/uploads
      - ./backups:/app/backups
    healthcheck:
      # Audit Cluster C P0: /api/ready does a real prisma.$queryRaw SELECT 1
      # so the container is only marked healthy when Postgres is reachable.
      # /api/health alone returned 200 even during a DB outage.
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/api/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  client:
    image: ghcr.io/${GHCR_OWNER:-servicecyclehq}/servicecycle-client:${SERVICECYCLE_VERSION:-latest}
    container_name: servicecycle-client
    # v0.35.3 -> v0.36.6: Pass-6 container hardening on the client service
    # was rolled back in v0.35.3 because nginx's docker-entrypoint.sh tries
    # to chown /var/cache/nginx/client_temp to uid 101 (nginx user) on every
    # start. Under cap_drop:ALL the CHOWN capability is dropped, so the
    # entrypoint fails with "Operation not permitted" and crash-loops.
    #
    # v0.36.6 partial-restore (Pass-6 Pass-2 P0-R3 / Pass-4 B-L4-01 fix path 1):
    # no-new-privileges:true is re-enabled below because it has zero entrypoint
    # compatibility issue. The cap_drop:ALL + cap_add:[CHOWN, SETUID, SETGID,
    # DAC_OVERRIDE] + read_only:true block remains deferred to a follow-up
    # release that tests against the nginx entrypoint (see audit/pass-6/
    # p6-pass4-compliance/layer_4_security_architecture.md B-L4-01 fix paths
    # 2 or 3).
    security_opt:
      - "no-new-privileges:true"
    pids_limit: 256
    mem_limit: 512m
    ulimits:
      nofile:
        soft: 4096
        hard: 4096
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - server
    # Same loopback default as the server service above; see comment there.
    ports:
      - "${SERVICECYCLE_HOST_BIND:-127.0.0.1}:${CLIENT_PORT:-5173}:80"
    # The published client image is built from client/Dockerfile.prod
    # (nginx serving the prebuilt SPA), so no command override needed.

volumes:
  postgres_data:
