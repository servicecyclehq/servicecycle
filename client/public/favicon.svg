<?xml version="1.0" encoding="UTF-8"?>
<!-- ServiceCycle favicon - the canonical BrandMark (ring + two terminals +
     gradient service arc; geometry identical to src/components/BrandMark.jsx,
     onDark colors) on a dark rounded tile so the thin ring stays legible in
     the browser tab. Matches the website logo + the PWA icon. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ServiceCycle">
  <title>ServiceCycle</title>
  <defs>
    <linearGradient id="sc-arc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#a3e635"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#0f172a"/>
  <circle cx="32" cy="32" r="26" fill="none" stroke="#94a3b8" stroke-width="4"/>
  <circle cx="12" cy="32" r="4.4" fill="#cbd5e1"/>
  <circle cx="52" cy="32" r="4.4" fill="#cbd5e1"/>
  <path d="M14 32 L22 25 L28 34 L35 24 L42 34 L50 32" fill="none"
        stroke="url(#sc-arc)" stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
