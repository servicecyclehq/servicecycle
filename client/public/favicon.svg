<?xml version="1.0" encoding="UTF-8"?>
<!-- ServiceCycle favicon — bold, legible-at-16px mark: petrol tile + a bright
     cyan→lime "maintenance pulse" (the renewal accent). Simplified vs the full
     BrandMark for small-size clarity. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ServiceCycle">
  <title>ServiceCycle</title>
  <defs>
    <linearGradient id="sc-fav-pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a3e635"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" rx="15" fill="#0d4f6e"/>
  <path d="M9 36 H21 L27.5 21 L36.5 45 L42 31 H55"
        fill="none" stroke="url(#sc-fav-pulse)" stroke-width="6.2"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
