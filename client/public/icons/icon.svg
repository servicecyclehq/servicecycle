<!-- ServiceCycle PWA icon — dark rounded-square tile + the canonical brand
     mark (onDark colors) centered at ~65% scale, leaving the safe zone that
     maskable icons need. Source of truth for the generated icon-192.png /
     icon-512.png (see scripts/generate-pwa-icons.mjs). Geometry matches
     src/components/BrandMark.jsx exactly — ONE mark at every size. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="scmark-icon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#a3e635"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="96" fill="#0f172a"/>
  <!-- Canonical 64×64 mark scaled to 65% of the tile (512 × 0.65 = 332.8 →
       scale 5.2) and centered ((512 − 332.8) / 2 = 89.6). -->
  <g transform="translate(89.6 89.6) scale(5.2)">
    <circle cx="32" cy="32" r="26" fill="none" stroke="#94a3b8" stroke-width="4"/>
    <circle cx="12" cy="32" r="4.4" fill="#cbd5e1"/>
    <circle cx="52" cy="32" r="4.4" fill="#cbd5e1"/>
    <path d="M14 32 L22 25 L28 34 L35 24 L42 34 L50 32" fill="none" stroke="url(#scmark-icon)" stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
