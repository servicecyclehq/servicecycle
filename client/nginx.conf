server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # F023 — explicit 404 for common scan/attack paths so the SPA fallback
    # below doesn't return 200 + index.html for /.git/HEAD, /.env, /wp-admin,
    # /phpmyadmin, etc. The body would just be the SPA index (no actual
    # leak), but 200 status on these paths obscures the 404 signal scanners
    # and defenders rely on, and slightly degrades the "no exposed
    # admin / wp-admin / phpmyadmin" signal. Filed 2026-05-08 Tier 1
    # external pen-test sweep, fix in client/nginx.conf because that's
    # where every demo + self-hosted request terminates.
    #
    # Patterns are conservative — only paths that are unambiguous attacker
    # probes. /.well-known/* is intentionally NOT blocked (a future SSO
    # IdP at the same origin needs /.well-known/openid-configuration).
    location ~* ^/(\.git/|\.env|\.DS_Store|\.aws/|\.ssh/|wp-admin|wp-login|wp-content|phpmyadmin|server-status) {
        return 404;
    }

    # Unhashed, render-blocking bootstrap scripts (theme + /api/bootstrap
    # prefetch). They DO change between deploys, so they must revalidate
    # instead of inheriting the 1y-immutable rule below (which strands
    # cached clients on stale logic). Tiny files => cheap 304s.
    location ~* ^/(bootstrap-prefetch|theme-bootstrap)\.js$ {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # Cache static assets aggressively (Vite fingerprints them)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy all /api/* requests to the Express server
    location /api/ {
        proxy_pass         http://server:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow large file uploads (contract documents)
        client_max_body_size 20m;

        # Timeouts for AI-heavy routes (ingest/brief can take 30s+)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # SPA fallback — all other routes serve index.html.
    #
    # Pass-6 Pass-5 D-P1-A9 (v0.36.6): force-reload of the SPA wrapper on each
    # navigation so a tab open since the previous deploy doesn't keep loading
    # the old /assets/index-<hash>.js bundle until the user hard-refreshes.
    # Vite-fingerprinted assets in the regex location above stay cacheable for
    # a year (public, immutable); the HTML wrapper does NOT. The `always` flag
    # ensures the header is emitted on every response status (200, 404, etc.).
    location / {
        add_header Cache-Control "no-store, max-age=0, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        try_files $uri $uri/ /index.html;
    }
}
