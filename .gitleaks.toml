# Gitleaks configuration for ServiceCycle
# https://github.com/gitleaks/gitleaks
#
# Purpose: prevent false positives on known-safe fixtures.
# Custom rules are added additively via `[[rules]]`.

title = "ServiceCycle Gitleaks config"

# Extend the default ruleset (recommended).
# Docs: https://github.com/gitleaks/gitleaks/blob/master/README.md#configuration
[extend]
useDefault = true

# ─────────────────────────────────────────────────────────────────────────
# Global allowlist — files that Gitleaks should not scan
# ─────────────────────────────────────────────────────────────────────────
[allowlist]
description = "Global false-positive allowlist"

# Files with known example / documentation values only.
#
# [2026-07-05 review fix] The security + compliance docs (docs/security/*.md,
# docs/compliance/*.md, docs/SOC2_*.md, and the named docs below) used to be
# ENTIRELY path-exempted -- "these docs only reference env var names, not
# secrets" was true when written, but a path exemption doesn't enforce that;
# it just means gitleaks would silently wave through a real key pasted into
# ANY of these files by accident, forever, with zero warning -- and these
# are exactly the files someone drafting compliance evidence is most likely
# to paste a real value into while writing rotation/runbook instructions.
# That's the same "a working fallback masks a real capture gap" pattern this
# whole review night has been hunting for real secrets. Only genuine
# templates/manifests stay path-exempt below; the security/compliance docs
# are now actually scanned, with the SPECIFIC placeholder idioms they use
# (verified by reading them: "(see git log)", "your-x-here", bare env var
# NAMES, etc.) allowlisted by content in `regexes` instead.
paths = [
  '''server/\.env\.example$''',
  '''client/\.env\.example$''',
  '''\.env\.example$''',
  '''CHANGELOG\.md$''',
  '''SECURITY\.md$''',
  # SBOM listing — package hashes, not credentials.
  '''server/sbom/cyclonedx\.json$''',
  # This config itself.
  '''\.gitleaks\.toml$''',
]

# Known-safe patterns that appear in code as placeholders / test values.
regexes = [
  '''test-secret-minimum-32-chars-long-for-ci-!!''',
  '''AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=''',
  # 2026-07-08 Run 2 (W1-L12): was '''your-.*-here''' -- unanchored + greedy
  # `.*` meant this could match clear across a line (through whitespace,
  # punctuation, anything) as long as SOME "your-" appeared before and
  # SOME "-here" appeared after, anywhere later in the same line -- e.g. a
  # line pairing an unrelated "your-" idiom with a real secret that happens
  # to be followed by "-here" elsewhere would be silently allowlisted.
  # Anchored to a single placeholder-shaped token: "your-" + 1-40 word/hyphen
  # characters + "-here", nothing else in between.
  '''your-[\w-]{1,40}-here''',
  '''change-me-in-prod''',
  '''example[_-]?(key|secret|token)''',
  # Compliance/runbook doc idioms (docs/security/*.md, docs/compliance/*.md,
  # docs/SOC2_*.md and friends) -- these reference rotation state and env var
  # NAMES, never real values.
  '''\(see git log\)''',
  '''N/A \(transient\)''',
]

# ─────────────────────────────────────────────────────────────────────────
# Custom rules — SC-specific patterns
# ─────────────────────────────────────────────────────────────────────────

# Nothing custom yet. Default rules cover AWS, GCP, generic API keys,
# private keys, JWTs, database URLs, etc.
