# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# ServiceCycle â€” docker-compose.yml (Sprint 5, B4)
#
# Single-machine self-hosted stack: Postgres + ServiceCycle API server + Vite
# client (running `npm run preview` to serve the prebuilt SPA). All three
# services are wired so a fresh `git clone` + populated `.env` + `docker
# compose up --build` produces a working install reachable on:
#
#   http://localhost:3001/api/health    (server, JSON status/version/uptime)
#   http://localhost:5173               (client, served by `vite preview`)
#
# Persistence model â€” read this before deploying:
#
#   1. Database â€” postgres_data  (named Docker volume, OS-managed)
#      Lives outside the container filesystem so postgres data survives
#      `docker compose down`, image rebuilds, and Postgres minor-version
#      upgrades. To FULLY wipe the database for a fresh start, run
#      `docker compose down -v` â€” that explicitly destroys the named
#      volume. Without `-v`, the volume is preserved.
#
#   2. Documents â€” ./uploads (bind mount)
#      Operator-facing host directory. Files persist on the host so they
#      survive every container action (rebuild, prune, etc.). Backing up
#      this directory + a recent pg_dump is a complete instance backup.
#      DELETING the host directory permanently removes all uploaded
#      contracts. The server image preserves /app/uploads inside the
#      image as well, but anything in there is overlaid (and shadowed)
#      by the bind mount at runtime.
#
#   3. Backups â€” ./backups (bind mount)
#      Where lib/backup.js writes nightly pg_dump.gz files (cron 02:00
#      server time, 30-day retention). On the host so the operator can
#      copy them off-box. If you delete this directory you lose backup
#      history but not the live database.
#
# Required env vars (read from a .env file in the repo root, NOT the
# server/ subtree â€” Compose's interpolation only sees the file beside
# this docker-compose.yml). See server/.env.example for the full list.
#
# Quick-start:
#   1. cp server/.env.example .env
#   2. Fill in JWT_SECRET (â‰¥32 chars) and MASTER_KEY (44-char base64 of
#      32 random bytes). Both are validated at server startup; weak or
#      missing values refuse to boot. See .env.example header for
#      generators.
#   3. docker compose up --build
#
# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

services:

  # â”€â”€ Database â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  db:
    image: postgres:16-alpine
    container_name: servicecycle-db
    # Pass-6 container hardening â€” drops Linux caps, blocks privilege
    # escalation, makes rootfs read-only with explicit tmpfs for the bits
    # postgres legitimately needs (/tmp for sorts, /var/run/postgresql for
    # the unix socket).
    #
    # 2026-06-10: cap_drop:ALL + read_only:true were REMOVED here -- the
    # postgres:16-alpine entrypoint chmod/chowns its data dir and
    # /var/run/postgresql on every start, which fails ("Operation not
    # permitted") under cap_drop:ALL + a read-only rootfs and crash-loops the
    # DB. docker-compose.ghcr.yml already did this rollback; main now matches.
    security_opt:
      - "no-new-privileges:true"
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /var/run/postgresql:size=20m
    pids_limit: 256
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1g
    ulimits:
      nofile:
        soft: 4096
        hard: 4096
    restart: unless-stopped
    # Cap container log retention so Docker's default unbounded json-file
    # driver can't fill the host disk. ~10 MB Ã— 3 files â‰ˆ 30 MB per service.
    # Backstops the Privacy Policy "30-day server-log retention target" claim
    # by guaranteeing logs roll on size; operators wanting strict 30-day
    # time-based retention should layer a logrotate / fluent-bit pipeline
    # on top.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-servicecycle}
      POSTGRES_USER:     ${POSTGRES_USER:-servicecycle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    # Pass-6 hardening â€” defense-in-depth against expensive-query DoS and
    # leaked-credential investigations. The flags are documented as Postgres
    # GUCs (postgresql.org/docs/16/runtime-config.html) and override
    # postgresql.conf at startup. Any of these can be relaxed by setting the
    # matching POSTGRES_* env var â€” the command line uses literal values so
    # operators wanting longer timeouts must edit this block, not just .env.
    #   statement_timeout=30s â€” caps any single SQL statement at 30 seconds
    #   lock_timeout=10s â€” caps time spent waiting to acquire a row/table lock
    #     (L6, 2026-06-09 audit) so a statement blocked on a lock fails fast
    #     instead of sitting until the 30s statement_timeout cap
    #   idle_in_transaction_session_timeout=60s â€” kills idle held transactions
    #   log_min_duration_statement=1000 â€” logs SQL text of statements >1s
    #   log_connections=on / log_disconnections=on â€” connection-level audit trail
    command:
      - "postgres"
      - "-c"
      - "statement_timeout=30s"
      - "-c"
      - "lock_timeout=10s"
      - "-c"
      - "idle_in_transaction_session_timeout=60s"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
      - "-c"
      - "autovacuum_vacuum_scale_factor=0.05"
      - "-c"
      - "autovacuum_analyze_scale_factor=0.02"
    volumes:
      # postgres_data â€” Postgres on-disk database files. Named Docker volume so
      # data survives container rebuilds and Postgres minor-version upgrades.
      # Destroyed only by `docker compose down -v`.
      - postgres_data:/var/lib/postgresql/data
    # Port not exposed by default â€” only the server needs DB access. Uncomment
    # the ports block below if you want to point a local psql client at it.
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "psql -U $${POSTGRES_USER} -d $${POSTGRES_DB} -c 'SELECT 1' > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # â”€â”€ DB migrations (init container) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # 2026-06-10: mirrors docker-compose.ghcr.yml's server-migrate. Runs
  # `prisma migrate deploy` once (applies the squashed 20260606000000_init
  # baseline) and exits 0. The API server waits on
  # service_completed_successfully, so a failed migration leaves the API
  # un-started (clean failure) instead of crash-looping. Without this service
  # `docker compose up --build` would start the API against an un-migrated DB.
  server-migrate:
    build:
      context: ./server
      dockerfile: Dockerfile.migrate
    container_name: servicecycle-migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-servicecycle}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-servicecycle}"
      MASTER_KEY:   ${MASTER_KEY:?MASTER_KEY must be set in .env (44-char base64 of 32 random bytes)}
      NODE_ENV:     ${NODE_ENV:-production}

  # â”€â”€ API Server â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: servicecycle-server
    # Pass-6 container hardening â€” see db service for rationale. /tmp is
    # tmpfs so sharp/prisma/ephemeral writes still work on a read-only root.
    # 2026-06-10: cap_drop:ALL + read_only:true removed for parity with the db
    # service (see its note). no-new-privileges + tmpfs + limits retained.
    # v5 scan: cap_drop:ALL restored for server (Node process does not need
    # Linux capabilities; safe to drop all).
    security_opt:
      - “no-new-privileges:true”
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    pids_limit: 256
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 1g
    ulimits:
      nofile:
        soft: 4096
        hard: 4096
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
      server-migrate:
        condition: service_completed_successfully
    # Host-port binding defaults to 127.0.0.1 (defense-in-depth, 2026-05-12):
    # for local dev that's fine (host:3001 still works from the same machine).
    # If you need to hit the server from another box on the LAN (e.g. running
    # mobile dev on a phone), set `SERVICECYCLE_HOST_BIND=0.0.0.0` in .env.
    ports:
      - "${SERVICECYCLE_HOST_BIND:-127.0.0.1}:${SERVER_PORT:-3001}:3001"
    environment:
      # Built from the postgres service vars so the operator only writes
      # the password in one place. Use the in-network hostname `db`.
      DATABASE_URL: "postgresql://${POSTGRES_USER:-servicecycle}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-servicecycle}?connection_limit=${DB_CONNECTION_LIMIT:-10}&pool_timeout=${DB_POOL_TIMEOUT:-30}"

      # Required â€” startup validation refuses to boot without these.
      JWT_SECRET:   ${JWT_SECRET:?JWT_SECRET must be set in .env (>=32 chars, see server/.env.example)}
      MASTER_KEY:   ${MASTER_KEY:?MASTER_KEY must be set in .env (44-char base64 of 32 random bytes)}

      # Required when NODE_ENV=production so CORS locks to a specific origin.
      # Leave the default for local development; override on a real deploy.
      CLIENT_URL:   ${CLIENT_URL:-http://localhost:5173}
      NODE_ENV:     ${NODE_ENV:-production}

      # Optional â€” security/CORP knob for split-domain hosting.
      CORP_POLICY:  ${CORP_POLICY:-same-site}

      # Trust X-Forwarded-* headers from a single hop in front (Caddy /
      # nginx / Traefik). REQUIRED when running behind a reverse proxy or
      # `req.ip` returns the proxy IP and per-IP rate limits collapse.
      # NEVER enable on a directly-internet-exposed instance.
      TRUST_PROXY:  ${TRUST_PROXY:-false}

      # Optional â€” demo sandbox flag. true â†’ forces email mock, AI off,
      # registration open, nightly seed reset at 03:30 server time.
      DEMO_MODE:    ${DEMO_MODE:-false}

      # Optional â€” open self-serve signup. DEMO_MODE forces this true.
      REGISTRATION_OPEN: ${REGISTRATION_OPEN:-false}

      # CSP escape hatch for production debugging only.
      CSP_REPORT_ONLY:  ${CSP_REPORT_ONLY:-false}

      # #6 email-in webhook auth. INBOUND_WEBHOOK_SECRET = shared secret (sim /
      # non-Resend providers). RESEND_* = live Resend inbound (Svix signature +
      # Attachments API). All optional; the webhook fails closed without one.
      INBOUND_WEBHOOK_SECRET: ${INBOUND_WEBHOOK_SECRET:-}
      RESEND_WEBHOOK_SECRET:  ${RESEND_WEBHOOK_SECRET:-}
      RESEND_API_KEY:         ${RESEND_API_KEY:-}

      # JWT lifetime â€” short defaults already in code; override here only
      # for compliance-driven adjustments.
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-}

      # Audit-log retention (days). Defaults: ActivityLog 365, BackupLog 180.
      ACTIVITY_LOG_RETENTION_DAYS: ${ACTIVITY_LOG_RETENTION_DAYS:-}
      BACKUP_LOG_RETENTION_DAYS:   ${BACKUP_LOG_RETENTION_DAYS:-}

      # Backup encryption (default true). Wraps pg_dump.gz with AES-256-GCM
      # using a key derived from MASTER_KEY. Decrypt via
      # `node scripts/decrypt-backup.js <file>` â€” see docs/operator-playbook.md.
      BACKUP_ENCRYPT: ${BACKUP_ENCRYPT:-true}

      # Document storage. Default is local filesystem; switch to s3 to
      # offload to S3 / R2 / MinIO. STORAGE_S3_* vars only required when
      # STORAGE_DEST=s3.
      STORAGE_DEST:               ${STORAGE_DEST:-local}
      STORAGE_S3_BUCKET:          ${STORAGE_S3_BUCKET:-}
      STORAGE_S3_REGION:          ${STORAGE_S3_REGION:-}
      STORAGE_S3_ACCESS_KEY_ID:   ${STORAGE_S3_ACCESS_KEY_ID:-}
      STORAGE_S3_SECRET_ACCESS_KEY: ${STORAGE_S3_SECRET_ACCESS_KEY:-}
      STORAGE_S3_ENDPOINT:        ${STORAGE_S3_ENDPOINT:-}

      # Backup destination. Same model as document storage.
      BACKUP_DEST:               ${BACKUP_DEST:-local}
      BACKUP_S3_BUCKET:          ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_REGION:          ${BACKUP_S3_REGION:-}
      BACKUP_S3_ACCESS_KEY_ID:   ${BACKUP_S3_ACCESS_KEY_ID:-}
      BACKUP_S3_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
      BACKUP_S3_ENDPOINT:        ${BACKUP_S3_ENDPOINT:-}

      # Document encryption opt-in. Once enabled and at least one document
      # is encrypted the flag cannot be flipped back without losing data.
      ENCRYPT_DOCS: ${ENCRYPT_DOCS:-false}

      # Email â€” when EMAIL_MOCK=true the rest of the email vars are ignored.
      EMAIL_MOCK:     ${EMAIL_MOCK:-true}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      EMAIL_FROM:     ${EMAIL_FROM:-}
      SUPPORT_EMAIL:  ${SUPPORT_EMAIL:-support@servicecycle.app}
      SALES_EMAIL:    ${SALES_EMAIL:-sales@servicecycle.app}

      # Slack â€” optional. Per-account configuration via Settings UI is the
      # primary surface; these env vars exist for operators who'd rather wire
      # one webhook up at the host level. SLACK_MOCK logs payloads to the
      # console instead of sending â€” set true for local/CI.
      SLACK_ENABLED:     ${SLACK_ENABLED:-false}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SLACK_MOCK:        ${SLACK_MOCK:-false}

      # AI â€” opt-in. AI_ENABLED=false runs the app without AI extraction
      # (manual contract entry still works).
      AI_ENABLED:    ${AI_ENABLED:-false}
      AI_PROVIDER:   ${AI_PROVIDER:-anthropic}
      AI_API_KEY:    ${AI_API_KEY:-}
      AI_MODEL:      ${AI_MODEL:-}
      # Groq cross-provider fallback â€” free second tier behind Gemini. When
      # Gemini's daily free quota is exhausted, image reads (nameplate OCR) fall
      # to Groq's Llama-4 vision model. AI_VISION_FALLBACK defaults to groq.
      GROQ_API_KEY:        ${GROQ_API_KEY:-}
      GROQ_VISION_MODEL:   ${GROQ_VISION_MODEL:-}
      GROQ_MODEL:          ${GROQ_MODEL:-}
      AI_VISION_FALLBACK:  ${AI_VISION_FALLBACK:-groq}
      AZURE_OPENAI_API_KEY:    ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT:   ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}

      # Phase 4 v0.4.x â€” Tavily web-search enrichment of the renewal
      # brief's Market section. Optional: omit to disable enrichment
      # (brief still generates without it; the no-reference fallback
      # fires and the LLM leans on its training knowledge).
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}

      # Phase 4 v0.4.x â€” per-action AI daily-cap overrides. Self-host
      # default is UNLIMITED; these matter only on shared instances.
      AI_DAILY_CAP_PER_USER:               ${AI_DAILY_CAP_PER_USER:-}
      AI_DAILY_CAP_PER_USER_EXTRACT:       ${AI_DAILY_CAP_PER_USER_EXTRACT:-}
      AI_DAILY_CAP_PER_USER_ASK:           ${AI_DAILY_CAP_PER_USER_ASK:-}
      AI_DAILY_CAP_PER_USER_BRIEF:         ${AI_DAILY_CAP_PER_USER_BRIEF:-}
      AI_DAILY_CAP_PER_USER_BRIEF_SEARCH:  ${AI_DAILY_CAP_PER_USER_BRIEF_SEARCH:-}
      # Demo nameplate-scan preview cap (AI camera scans only; deterministic
      # doc import stays free). Per-action override works regardless of
      # DEMO_MODE, so the gated demo can cap scans without the full sandbox.
      AI_DAILY_CAP_PER_USER_NAMEPLATE_SCAN: ${AI_DAILY_CAP_PER_USER_NAMEPLATE_SCAN:-}

      # Phase 4 v0.4.4 â€” per-brief output budget. Auto-defaults to 1800 in
      # DEMO_MODE, 2250 on self-host (more headroom for complex contracts;
      # customer using own API key). Set here to override either default.
      AI_BRIEF_MAX_TOKENS: ${AI_BRIEF_MAX_TOKENS:-}

      # Vendor news scanner â€” opt-in nightly scrape.
      NEWS_SCANNER_ENABLED: ${NEWS_SCANNER_ENABLED:-false}

      # Stripe billing seam (Sprint 6). Unset on self-hosted licensed
      # instances; keys + price IDs only matter when STRIPE_ENABLED=true.
      # See docs/stripe-integration.md.
      STRIPE_ENABLED:             ${STRIPE_ENABLED:-false}
      STRIPE_SECRET_KEY:          ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET:      ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID_SMALL:      ${STRIPE_PRICE_ID_SMALL:-}
      STRIPE_PRICE_ID_MID:        ${STRIPE_PRICE_ID_MID:-}
      STRIPE_PRICE_ID_ENTERPRISE: ${STRIPE_PRICE_ID_ENTERPRISE:-}

      # The server reads PORT for express.listen. Hard-pinned to 3001 inside
      # the container; the host-side port is configurable via SERVER_PORT.
      PORT: 3001
    # SHUTDOWN_TIMEOUT_MS = 25_000 in server/index.ts — Docker's default
    # stop_grace_period is 10s which sends SIGKILL before Node's graceful
    # shutdown completes. 30s gives Node enough runway to drain in-flight
    # requests and close the Prisma pool cleanly.
    stop_grace_period: 30s
    volumes:
      # ./uploads â€” document storage bind mount. Files written here by the
      # server (PDFs, Word docs, images) persist on the HOST so they survive
      # every container action. If you delete this directory all uploaded
      # contracts vanish. Backing it up + the latest pg_dump is a complete
      # instance backup. Switch STORAGE_DEST=s3 in .env to skip the local
      # store entirely (uploads then go straight to S3).
      - ./uploads:/app/uploads

      # ./backups â€” daily pg_dump.gz output written by lib/backup.js (cron
      # 02:00, retention 30 days). Bind-mounted to the host so operators can
      # copy backups off the machine. If you delete this directory you lose
      # backup HISTORY but the live database is untouched.
      - ./backups:/app/backups

  # â”€â”€ SPA / static client â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Runs `npm run preview` to serve the production build of the React app.
  # For a real deployment, replace this with an nginx stage that copies
  # `client/dist` and adds proper cache headers â€” see docker-compose.prod.yml
  # for the nginx variant.
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: servicecycle-client
    # Pass-6 container hardening (dev) â€” relaxed read_only because vite
    # build writes to node_modules/.vite cache. Still drops Linux caps and
    # blocks privilege escalation. Production clients (compose.prod /
    # compose.ghcr) run nginx on a read-only rootfs.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    pids_limit: 512
    mem_limit: 2g
    ulimits:
      nofile:
        soft: 4096
        hard: 4096
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - server
    environment:
      # The browser reaches the API at this URL. Default targets the host
      # port mapping above.
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    # Same 127.0.0.1 default as the server service. Override
    # SERVICECYCLE_HOST_BIND=0.0.0.0 in .env if you need LAN access.
    ports:
      - "${SERVICECYCLE_HOST_BIND:-127.0.0.1}:${CLIENT_PORT:-5173}:5173"
    # No persistent volumes â€” the client is fully derived from source.
    # The default client/Dockerfile boots `npm run dev` (Vite's hot-reload
    # server) for local development. For B4 we override the command to
    # produce a production build and serve it via `vite preview`. This is
    # the "v1 simpler" path called out in the brief; production deployments
    # should switch to the nginx stage in client/Dockerfile.prod and use
    # docker-compose.prod.yml.
    command:
      - sh
      - -c
      # NODE_OPTIONS heap bump: the droplet is a 1GB box and vite's build OOMs
      # at Node's default heap; raise the ceiling so it can spill into swap.
      - "NODE_OPTIONS=--max-old-space-size=2048 npm run build && npm run preview -- --host 0.0.0.0 --port 5173"


# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

volumes:
  postgres_data:
